                    }
                    if (Object.keys(upd).length > 0) await updateDoc(userRef, upd);
                })();
            }, [currentUser.id, currentUser.baseAtk]);

            // 每日結算（重設 daily 計數、補滿 HP、發送登入獎勵、清理過期 buff）
            // 用 transaction：同帳號多裝置同時開，也只會領到一次獎勵
            useEffect(() => {
                if (!currentUser || !currentUser.lastLoginDate) return;
                const today = formatDate(new Date());
                if (currentUser.lastLoginDate !== today) {
                    (async () => {
                        const { doc, runTransaction } = window.firebaseModules;
                        const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', currentUser.id);
                        let awarded = false;
                        try {
                            await runTransaction(db, async (t) => {
                                const snap = await t.get(userRef);
                                if (!snap.exists()) { awarded = false; return; }
                                const d = snap.data();
                                if (d.lastLoginDate === today) { awarded = false; return; } // 別台裝置已領過
                                const eff = getEffectiveStats(d);
                                t.update(userRef, {
                                    hp: eff.maxHp,
                                    gold: (d.gold || 0) + 50,
                                    totalGoldEarned: (d.totalGoldEarned || 0) + 50,
                                    lastLoginDate: today,
                                    dailyQuizCount: 0,
                                    dailyPkAttacks: 0,
                                    dailyPkDefenses: 0,
                                    extraQuizUsed: false,
                                    heartsSentToday: {},
                                    buffs: cleanExpiredBuffs(d.buffs)
                                });
                                awarded = true;
                            });
                        } catch (e) { console.error("每日結算失敗", e); }
                        if (awarded) setMsg({ title: "每日登入獎勵", content: "歡迎回來！HP 已補滿，獲得 50 金幣！" });
                    })();
                }
            }, [currentUser.lastLoginDate]);

            // 新手禮：每個帳號一生領一次（已註冊的舊生下次登入自動補發），用 transaction 防重複
            useEffect(() => {
                if (!currentUser || !currentUser.id || currentUser.welcomeGiftReceived) return;
                (async () => {
                    const { doc, runTransaction } = window.firebaseModules;
                    const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', currentUser.id);
                    let awarded = false;
                    try {
                        await runTransaction(db, async (t) => {
                            const snap = await t.get(userRef);
                            if (!snap.exists()) { awarded = false; return; }
                            const d = snap.data();
                            if (d.welcomeGiftReceived) { awarded = false; return; }
                            t.update(userRef, {
                                gold: (d.gold || 0) + 50,
                                totalGoldEarned: (d.totalGoldEarned || 0) + 50,
                                welcomeGiftReceived: true
                            });
                            awarded = true;
                        });
                    } catch (e) { console.error("新手禮發放失敗", e); }
                    if (awarded) setMsg({ title: "🎁 新手禮", content: "歡迎來到煉金學園！新手禮 50 金幣入袋，去商店逛逛吧！" });
                })();
            }, [currentUser.id, currentUser.welcomeGiftReceived]);

            const drawDailyFortune = () => {
                const fortunes = [
                    { element: 'H', name: '氫', desc: '輕盈的一天，適合嘗試新事物！' },
                    { element: 'Au', name: '金', desc: '財運亨通，去商店看看吧！' },
                    { element: 'O', name: '氧', desc: '人氣旺盛，助燃你的人際關係！' },
                    { element: 'Fe', name: '鐵', desc: '意志堅定，困難都能迎刃而解！' },
                    { element: 'Ne', name: '氖', desc: '雖然邊緣，但你發出的光芒最獨特。' }
                ];
                setFortuneResult(fortunes[Math.floor(Math.random() * fortunes.length)]);
            };

            const acknowledgeNotification = async () => {
                if (pkNotification) {
                    await window.firebaseModules.deleteDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'notifications', pkNotification.id));
                    setPkNotification(null);
                }
            };

            const eff = getEffectiveStats(currentUser);
            const quizCap = currentUser.extraQuizUsed ? 2 : 1; // 用過機會券再加 3 題（透過先把 count 扣 3）

            return (
                <div className="max-w-4xl mx-auto pb-20">
                    <div className="glass-panel p-4 mb-4 sticky top-2 z-40">
                        <div className="flex items-center gap-4">
                            <img src={currentUser.avatar} className="w-16 h-16 rounded-full border-2 border-blue-500 bg-white p-1 object-cover" />
                            <div className="flex-1">
                                <div className="flex justify-between items-end mb-1">
                                    <h2 className="text-xl font-black text-slate-800 flex items-center gap-2 flex-wrap">
                                        <span className="element-badge text-lg">{currentUser.levelName}</span>
                                        {currentUser.nickname || currentUser.name}
                                        <span className="text-xs bg-slate-200 px-2 py-1 rounded text-slate-600">Lv.{Math.floor((currentUser.xp || 0) / 100)}</span>
                                    </h2>
                                    <div className="text-yellow-600 font-bold bg-yellow-50 px-2 py-1 rounded border border-yellow-200"><i className="fas fa-coins"></i> {currentUser.gold || 0}</div>
                                </div>
                                <div className="grid grid-cols-3 gap-2 text-xs font-bold text-white text-center">
                                    <div className="bg-red-500 rounded p-1 relative overflow-hidden shadow-sm" title="生命值">
                                        <span className="relative z-10 drop-shadow-md">HP {currentUser.hp || 0}/{eff.maxHp}</span>
                                    </div>
                                    <div className="bg-orange-500 rounded p-1 shadow-sm">ATK {eff.atk}</div>
                                    <div className="bg-indigo-500 rounded p-1 shadow-sm">DEF {eff.def}</div>
                                </div>
                                <BuffBar user={currentUser} />
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-5 gap-2 mb-4 px-2">
                        {[
                            { id: "home", icon: "fa-home", label: "首頁" },
                            { id: "shop", icon: "fa-store", label: "商店" },
                            { id: "inventory", icon: "fa-box", label: "物品" },
                            { id: "lobby", icon: "fa-users", label: "大廳" },
                            { id: "rank", icon: "fa-trophy", label: "排行" }
                        ].map(t => (
                            <button key={t.id} onClick={() => setView(t.id)} className={`p-3 rounded-xl font-bold transition flex flex-col items-center justify-center gap-1 ${view === t.id ? 'bg-blue-600 text-white shadow-lg scale-105' : 'glass-panel text-slate-500 hover:bg-white'}`}>
                                <i className={`fas ${t.icon} text-lg`}></i><span className="text-xs">{t.label}</span>
                            </button>
                        ))}
                    </div>

                    <div className="px-2">
                        {view === 'home' && (
                            <div className="space-y-4">
                                <div className="glass-panel p-4 text-center cursor-pointer hover:bg-purple-50 border border-transparent hover:border-purple-300 transition" onClick={drawDailyFortune}>
                                    <div className="flex items-center justify-center gap-2 text-purple-600 font-bold text-lg mb-1">
                                        <i className="fas fa-star"></i> 每日元素占卜
                                    </div>
                                    <p className="text-xs text-slate-500">測測今天的運勢與幸運元素！</p>
                                </div>

                                {inMaintenance ? (
                                    <div className="glass-panel p-6 text-center">
                                        <i className="fas fa-cogs text-4xl text-orange-400 mb-3 fa-spin"></i>
                                        <h3 className="text-xl font-bold text-slate-800 mb-2">學年統計計算中</h3>
                                        <p className="text-sm text-slate-500">系統目前不開放答題（7/1 ~ 7/15）。</p>
                                        {isStudentReportPeriod() && (
                                            <button onClick={downloadMyReport} disabled={downloading} className="mt-4 bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-emerald-700 disabled:opacity-50">
                                                <i className={`fas ${downloading ? 'fa-spinner fa-spin' : 'fa-file-pdf'}`}></i> {downloading ? "產生中..." : "下載我的學習報告"}
                                            </button>
                                        )}
                                    </div>
                                ) : (
                                    <div className="glass-panel p-6 text-center cursor-pointer hover:bg-yellow-50/80 border border-transparent hover:border-yellow-400 transition group" onClick={() => {
                                        if ((currentUser.dailyQuizCount || 0) >= 1) return setMsg({ title: "提示", content: "今日答題次數已用完！明天再來吧！（或使用『答題機會券』）" });
                                        setQuizModal(true);
                                    }}>
                                        <div className="text-5xl mb-3 text-yellow-500 group-hover:scale-110 transition"><i className="fas fa-brain"></i></div>
                                        <h3 className="text-xl font-bold mb-1 text-slate-800">答題賺金幣</h3>
                                        <p className="text-slate-500 text-sm">範圍：{activeInfo.label}</p>
                                        <p className="text-slate-400 text-xs mt-1">每日限一次 (3題)</p>
                                        {(currentUser.dailyQuizCount || 0) >= 1 && <div className="text-red-500 font-bold text-xs mt-2 bg-red-100 inline-block px-2 py-1 rounded">已完成</div>}
                                    </div>
                                )}

                                <div className="glass-panel p-6 flex items-center justify-between">
                                    <div>
                                        <h3 className="font-bold text-lg text-slate-800">我的資料</h3>
                                        <p className="text-sm text-slate-500">座號: {currentUser.seat} | 愛心: <span className="text-pink-500 font-bold">{currentUser.hearts || 0}</span></p>
                                        <p className="text-xs text-slate-400 mt-1">
                                            生涯答對率 {(currentUser.totalQuizQuestions || 0) > 0 ? Math.round(((currentUser.totalQuizCorrect || 0) / currentUser.totalQuizQuestions) * 100) : 0}%
                                            ｜PK 勝/負/平 {currentUser.pkWins || 0}/{currentUser.pkLosses || 0}/{currentUser.pkDraws || 0}
                                        </p>
                                    </div>
                                    <div className="flex gap-2">
                                        <button onClick={() => setView('profile')} className="bg-slate-100 px-3 py-1 rounded hover:bg-slate-200 text-sm font-bold text-slate-600">修改設定</button>
                                        <button onClick={onLogout} className="bg-red-50 text-red-600 px-3 py-1 rounded hover:bg-red-100 text-sm font-bold">登出</button>
                                    </div>
                                </div>
                            </div>
                        )}
                        {view === 'shop' && <ShopView user={currentUser} db={db} classId={classId} setMsg={setMsg} />}
                        {view === 'inventory' && <InventoryView user={currentUser} db={db} classId={classId} setMsg={setMsg} />}
                        {view === 'lobby' && <LobbyView user={currentUser} db={db} classId={classId} setMsg={setMsg} />}
                        {view === 'rank' && <LeaderboardView db={db} currentUser={currentUser} isTeacherMode={false} />}
                        {view === 'profile' && <ProfileSettings user={currentUser} db={db} classId={classId} setMsg={setMsg} />}
                    </div>

                    {msg && <Modal title={msg.title} onClose={() => setMsg(null)} footer={<button onClick={() => setMsg(null)} className="bg-blue-600 text-white px-4 py-2 rounded font-bold">確定</button>}>{msg.content}</Modal>}
                    {quizModal && <QuizModal user={currentUser} db={db} classId={classId} activeChapters={activeInfo.chapters} onClose={() => setQuizModal(false)} onComplete={() => setQuizModal(false)} />}
                    {pkModal && <PKDefenderModal user={currentUser} pkData={pkModal} db={db} classId={classId} onComplete={() => setPkModal(null)} />}

                    {pkNotification && (
                        <Modal title={pkNotification.type === 'encourage_teacher' ? "💌 老師的鼓勵" : "⚔️ PK 戰報"} onClose={acknowledgeNotification}>
                            <div className="text-center space-y-4">
                                <p className="text-lg font-bold">{pkNotification.message}</p>
                                {pkNotification.type === 'encourage_teacher' && (pkNotification.gold || 0) > 0 && (
                                    <div className="text-yellow-600 font-bold bg-yellow-50 inline-block px-3 py-1 rounded border border-yellow-200"><i className="fas fa-coins"></i> 附贈 {pkNotification.gold} 金幣（已入帳）</div>
                                )}
                                <button onClick={acknowledgeNotification} className="bg-blue-600 text-white px-6 py-2 rounded font-bold">{pkNotification.type === 'encourage_teacher' ? "謝謝老師！" : "我知道了"}</button>
                            </div>
                        </Modal>
                    )}

                    {fortuneResult && (
                        <Modal title="✨ 今日運勢 ✨" onClose={() => setFortuneResult(null)}>
                            <div className="text-center p-4">
                                <div className="text-6xl font-black text-slate-800 mb-2 font-serif">{fortuneResult.element}</div>
                                <h3 className="text-2xl font-bold text-purple-600 mb-4">{fortuneResult.name}</h3>
                                <p className="text-lg text-slate-600 bg-purple-50 p-4 rounded-lg border border-purple-200">{fortuneResult.desc}</p>
                                <button onClick={() => setFortuneResult(null)} className="mt-6 bg-purple-600 text-white px-6 py-2 rounded-lg font-bold shadow hover:bg-purple-700">收下祝福</button>
                            </div>
                        </Modal>
                    )}

                    {pdfTarget && (
                        <HiddenReportPortal ref={pdfRef}>
                            {pdfTarget.node}
                        </HiddenReportPortal>
                    )}
                </div>
            );
        };

        // ============================================================
        // Teacher Components: Stats, History, Analysis
        // ============================================================
        const EditStatsModal = ({ student, onClose, onSave }) => {
            const eff = getEffectiveStats(student);
            const [stats, setStats] = useState({
                hp: student.hp || 0,
                baseMaxHp: student.baseMaxHp ?? student.maxHp ?? 100,
                baseAtk: student.baseAtk ?? student.atk ?? 10,
                baseDef: student.baseDef ?? student.def ?? 10,
                gold: student.gold || 0
            });
            return (
                <Modal title={`調整數值: ${student.name}`} onClose={onClose}>
                    <div className="space-y-3 p-1">
                        <div className="text-xs text-slate-500 mb-2">提示：基礎屬性是「不含裝備加成」的原始值。目前裝備後 ATK={eff.atk}、DEF={eff.def}、maxHP={eff.maxHp}</div>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-xs font-bold text-slate-500">當前生命 (HP)</label><input type="number" value={stats.hp} onChange={e => setStats({ ...stats, hp: parseInt(e.target.value) || 0 })} className="border p-2 w-full rounded" /></div>
                            <div><label className="text-xs font-bold text-slate-500">基礎最大生命</label><input type="number" value={stats.baseMaxHp} onChange={e => setStats({ ...stats, baseMaxHp: parseInt(e.target.value) || 0 })} className="border p-2 w-full rounded" /></div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <div><label className="text-xs font-bold text-slate-500">基礎 ATK</label><input type="number" value={stats.baseAtk} onChange={e => setStats({ ...stats, baseAtk: parseInt(e.target.value) || 0 })} className="border p-2 w-full rounded" /></div>
                            <div><label className="text-xs font-bold text-slate-500">基礎 DEF</label><input type="number" value={stats.baseDef} onChange={e => setStats({ ...stats, baseDef: parseInt(e.target.value) || 0 })} className="border p-2 w-full rounded" /></div>
                        </div>
                        <div><label className="text-xs font-bold text-slate-500">金幣 (Gold)</label><input type="number" value={stats.gold} onChange={e => setStats({ ...stats, gold: parseInt(e.target.value) || 0 })} className="border p-2 w-full rounded" /></div>
                        <button onClick={() => onSave(stats)} className="w-full bg-blue-600 text-white py-3 mt-4 rounded-lg font-bold shadow hover:bg-blue-700">儲存變更</button>
                    </div>
                </Modal>
            );
        };

        // 老師手動送鼓勵（附贈金幣立即入帳，訊息在學生下次登入時跳出）
        const EncourageModal = ({ student, db, classId, onClose, setMsg }) => {
            const [message, setMessage] = useState(TEACHER_ENCOURAGE_PRESETS[0]);
            const [gold, setGold] = useState(10);
            const [sending, setSending] = useState(false);

            const send = async () => {
                if (!message.trim()) return;
                setSending(true);
                try {
                    const fm = window.firebaseModules;
                    const goldAmt = Math.max(0, parseInt(gold) || 0);
                    if (goldAmt > 0) {
                        await fm.updateDoc(fm.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', student.id), {
                            gold: fm.increment(goldAmt),
                            totalGoldEarned: fm.increment(goldAmt)
                        });
                    }
                    await fm.addDoc(fm.collection(db, 'artifacts', APP_ID, 'public', 'data', 'notifications'), {
                        targetId: student.id,
                        type: 'encourage_teacher',
                        message: message.trim(),
                        gold: goldAmt,
                        timestamp: Date.now()
                    });
                    setMsg(`已送出鼓勵給 ${student.name}${goldAmt > 0 ? `（附 ${goldAmt} 金幣）` : ""}，學生下次登入會看到`);
                    onClose();
                } catch (e) {
                    setMsg("送出失敗：" + (e.message || e));
                    setSending(false);
                }
            };

            return (
                <Modal title={`💌 送鼓勵給 ${student.name}`} onClose={onClose}>
                    <div className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-2">快速選擇（點了還可以修改）</label>
                            <div className="flex flex-col gap-2">
                                {TEACHER_ENCOURAGE_PRESETS.map((p, i) => (
                                    <button key={i} onClick={() => setMessage(p)} className={`text-left text-sm p-2 rounded border ${message === p ? 'border-pink-400 bg-pink-50' : 'border-slate-200 hover:bg-slate-50'}`}>{p}</button>
                                ))}
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">鼓勵的話</label>
                            <textarea value={message} onChange={e => setMessage(e.target.value)} className="w-full h-20 border rounded p-2 text-sm resize-none" placeholder="輸入想對這位學生說的話..."></textarea>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">附贈金幣（0 = 只送訊息）</label>
                            <input type="number" min="0" value={gold} onChange={e => setGold(e.target.value)} className="w-full border rounded p-2 font-bold" />
                        </div>
                        <button disabled={sending || !message.trim()} onClick={send} className="w-full bg-pink-600 text-white py-3 rounded-lg font-bold hover:bg-pink-700 disabled:opacity-50">
                            {sending ? "送出中..." : "送出鼓勵"}
                        </button>
                    </div>
                </Modal>
            );
        };

        const QuizHistoryModal = ({ student, db, classId, onClose }) => {
            const [logs, setLogs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            useEffect(() => {
                const fetchLogs = async () => {
                    try {
                        const q = window.firebaseModules.query(
                            window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', classId, 'users', student.id, 'quiz_history'),
                            window.firebaseModules.orderBy('timestamp', 'desc'),
                            window.firebaseModules.limit(30)
                        );
                        const snap = await window.firebaseModules.getDocs(q);
                        setLogs(snap.docs.map(d => d.data()));
                    } catch (e) { setError("無法讀取資料"); }
                    finally { setLoading(false); }
                };
                fetchLogs();
            }, [student.id]);
            return (
                <Modal title={`${student.name} 的答題紀錄 (最近30筆)`} onClose={onClose}>
                    {loading ? <div className="text-center py-8"><i className="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i></div>
                        : error ? <div className="text-center text-red-500 py-8">{error}</div>
                        : logs.length === 0 ? <div className="text-center text-slate-500 py-8">這位同學還沒有答題紀錄</div>
                        : (
                            <div className="space-y-2 text-sm max-h-[60vh] overflow-y-auto">
                                {logs.map((log, i) => (
                                    <div key={i} className={`p-3 border rounded-lg flex justify-between items-center ${log.isCorrect ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}`}>
                                        <div className="flex-1">
                                            <div className="font-bold text-slate-800 mb-1">{log.question}</div>
                                            <div className="text-xs mb-1">
                                                {log.isCorrect
                                                    ? <span className="text-green-700">答 <b>{log.selectedOption || "?"}</b> ✓</span>
                                                    : <span className="text-slate-600">學生答 <b className="text-red-600">{log.selectedOption || "?"}</b>，正解 <b className="text-green-700">{log.correctOption || "?"}</b></span>}
                                            </div>
                                            <div className="text-xs text-slate-400">{log.chapter || ""} · {new Date(log.timestamp).toLocaleString()}</div>
                                        </div>
                                        <div className={`font-bold ml-2 ${log.isCorrect ? 'text-green-600' : 'text-red-500'}`}>{log.isCorrect ? '✓' : '✗'}</div>
                                    </div>
                                ))}
                            </div>
                        )
                    }
                </Modal>
            );
        };

        const QuizAnalysisView = ({ students, db, classId }) => {
            const active = useMemo(() => students.filter(s => (s.totalQuizQuestions || 0) > 0), [students]);
            // 全班錯題排行：null=未載入、'loading'=載入中、陣列=結果
            const [wrongStats, setWrongStats] = useState(null);
            const loadWrongStats = async () => {
                setWrongStats('loading');
                try {
                    const agg = {};
                    for (const s of students) {
                        const snap = await window.firebaseModules.getDocs(
                            window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', classId, 'users', s.id, 'quiz_history'));
                        snap.forEach(d => {
                            const h = d.data();
                            if (!h.question) return;
                            if (!agg[h.question]) agg[h.question] = { question: h.question, chapter: h.chapter || "", total: 0, wrong: 0 };
                            agg[h.question].total += 1;
                            if (!h.isCorrect) agg[h.question].wrong += 1;
                        });
                    }
                    const list = Object.values(agg)
                        .filter(x => x.total >= 2)
                        .map(x => ({ ...x, rate: Math.round((x.wrong / x.total) * 100) }))
                        .sort((a, b) => b.rate - a.rate || b.wrong - a.wrong)
                        .slice(0, 20);
                    setWrongStats(list);
                } catch (e) { console.error(e); setWrongStats([]); }
            };
            const totalQ = active.reduce((a, s) => a + (s.totalQuizQuestions || 0), 0);
            const totalC = active.reduce((a, s) => a + (s.totalQuizCorrect || 0), 0);
            const acc = totalQ > 0 ? ((totalC / totalQ) * 100).toFixed(1) : 0;
            const struggling = active.filter(s => (s.totalQuizCorrect || 0) / (s.totalQuizQuestions || 1) < 0.6).sort((a, b) => parseInt(a.seat) - parseInt(b.seat));
            const top = active.filter(s => (s.totalQuizCorrect || 0) / (s.totalQuizQuestions || 1) >= 0.85 && s.totalQuizQuestions >= 5).sort((a, b) => (b.totalQuizCorrect / b.totalQuizQuestions) - (a.totalQuizCorrect / a.totalQuizQuestions));

            // 章節熱圖
            const chapterAgg = {};
            ALL_CHAPTERS.forEach(c => chapterAgg[c] = { q: 0, c: 0 });
            students.forEach(s => {
                Object.entries(s.chapterStats || {}).forEach(([ch, st]) => {
                    if (!chapterAgg[ch]) chapterAgg[ch] = { q: 0, c: 0 };
                    chapterAgg[ch].q += st.questions || 0;
                    chapterAgg[ch].c += st.correct || 0;
                });
            });

            return (
                <div className="space-y-6">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl p-6 text-white shadow-lg">
                            <h4 className="text-blue-100 font-bold mb-2 text-xs">班級平均答對率</h4>
                            <div className="text-5xl font-black">{acc}%</div>
                            <div className="text-sm text-blue-200 mt-2">總答對 {totalC} 題</div>
                        </div>
                        <div className="bg-gradient-to-br from-purple-500 to-pink-600 rounded-xl p-6 text-white shadow-lg">
                            <h4 className="text-purple-100 font-bold mb-2 text-xs">總答題熱度</h4>
                            <div className="text-5xl font-black">{totalQ}</div>
                            <div className="text-sm text-purple-200 mt-2">參與 {active.length}/{students.length} 人</div>
                        </div>
                    </div>

                    <div className="bg-white border rounded-xl p-4 shadow-sm">
                        <h4 className="font-bold text-slate-700 mb-3"><i className="fas fa-th"></i> 各章節答對率熱圖</h4>
                        <div className="grid grid-cols-3 md:grid-cols-6 gap-2">
                            {ALL_CHAPTERS.map(c => {
                                const a = chapterAgg[c];
                                const pct = a.q > 0 ? Math.round((a.c / a.q) * 100) : -1;
                                const bg = pct < 0 ? "bg-slate-100 text-slate-400" : pct < 50 ? "bg-red-200 text-red-700" : pct < 70 ? "bg-orange-200 text-orange-700" : pct < 85 ? "bg-yellow-200 text-yellow-800" : "bg-emerald-200 text-emerald-700";
                                return (
                                    <div key={c} className={`p-2 rounded text-center ${bg}`}>
                                        <div className="text-xs font-bold">{c}</div>
                                        <div className="text-lg font-black">{pct < 0 ? "—" : pct + "%"}</div>
                                        <div className="text-[10px]">{a.c}/{a.q}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="bg-white border rounded-xl p-4 shadow-sm">
                        <h4 className="font-bold text-slate-700 mb-3 flex justify-between items-center flex-wrap gap-2">
                            <span><i className="fas fa-bug text-red-400"></i> 全班錯題排行（每日答題）</span>
                            <button onClick={loadWrongStats} disabled={wrongStats === 'loading'} className="bg-red-500 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:bg-red-600 disabled:opacity-50">
                                {wrongStats === 'loading' ? '載入中...' : Array.isArray(wrongStats) ? '重新載入' : '載入錯題分析'}
                            </button>
                        </h4>
                        {wrongStats === null && <div className="text-xs text-slate-400">按「載入錯題分析」會讀取全班的答題紀錄做彙總（紀錄多時需要幾秒鐘）。</div>}
                        {wrongStats === 'loading' && <div className="text-center py-6 text-slate-400"><i className="fas fa-circle-notch fa-spin text-2xl"></i></div>}
                        {Array.isArray(wrongStats) && (
                            wrongStats.length === 0
                                ? <div className="text-center text-slate-400 py-6 text-sm">還沒有足夠的作答資料（同一題至少要 2 人次作答才列入）</div>
                                : (
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-xs text-left">
                                            <thead className="bg-slate-50 text-slate-500">
                                                <tr>
                                                    <th className="p-2 border-b w-20">章節</th>
                                                    <th className="p-2 border-b">題目</th>
                                                    <th className="p-2 border-b w-24 text-center">答錯率</th>
                                                    <th className="p-2 border-b w-20 text-center">錯/總</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {wrongStats.map((w, i) => (
                                                    <tr key={i} className={w.rate >= 50 ? 'bg-red-50' : ''}>
                                                        <td className="p-2 font-bold text-blue-600 whitespace-nowrap">{w.chapter}</td>
                                                        <td className="p-2 text-slate-700">{w.question}</td>
                                                        <td className={`p-2 text-center font-black ${w.rate >= 50 ? 'text-red-600' : w.rate >= 30 ? 'text-orange-500' : 'text-slate-500'}`}>{w.rate}%</td>
                                                        <td className="p-2 text-center font-mono text-slate-500">{w.wrong}/{w.total}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                        <div className="text-xs text-slate-400 mt-2">依答錯率排序，最多顯示 20 題；同一題至少 2 人次作答才列入統計。</div>
                                    </div>
                                )
                        )}
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-red-50 border border-red-100 rounded-xl p-4">
                            <h4 className="font-bold text-red-800 mb-3"><i className="fas fa-exclamation-circle text-red-500"></i> 需要關注（答對率 &lt; 60%）</h4>
                            {struggling.length === 0 ? <div className="text-center text-slate-400 py-6 text-sm">沒有落後的學生</div>
                                : <div className="space-y-2 max-h-[300px] overflow-y-auto">
                                    {struggling.map(s => (
                                        <div key={s.id} className="bg-white p-3 rounded border border-red-100 flex justify-between items-center">
                                            <div className="font-bold text-sm">{s.seat}號 {s.name}</div>
                                            <div className="font-bold text-red-500 bg-red-50 px-2 py-1 rounded text-sm">{Math.round((s.totalQuizCorrect / s.totalQuizQuestions) * 100)}% ({s.totalQuizQuestions}題)</div>
                                        </div>
                                    ))}
                                </div>
                            }
                        </div>
                        <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                            <h4 className="font-bold text-emerald-800 mb-3"><i className="fas fa-medal text-emerald-500"></i> 表現優異（答對率 ≥ 85%，且累積答滿 5 題）</h4>
                            {top.length === 0 ? <div className="text-center text-slate-400 py-6 text-sm">還沒有人達標（要累積答滿 5 題才列入，避免 3 題全對就被誤認為學霸）</div>
                                : <div className="space-y-2 max-h-[300px] overflow-y-auto">
                                    {top.map((s, idx) => (
                                        <div key={s.id} className="bg-white p-3 rounded border border-emerald-100 flex justify-between items-center">
                                            <div className="font-bold text-sm">#{idx + 1} {s.seat}號 {s.name}</div>
                                            <div className="font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded text-sm">{Math.round((s.totalQuizCorrect / s.totalQuizQuestions) * 100)}%</div>
                                        </div>
                                    ))}
                                </div>
                            }
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================
        // PK 戰報（老師用，唯讀）
        // ============================================================
        const PKHistoryView = ({ db, classId }) => {
            const [logs, setLogs] = useState(null); // null = 載入中
            const [onlyMyClass, setOnlyMyClass] = useState(true);

            useEffect(() => {
                if (!db) return;
                (async () => {
                    try {
                        const q = window.firebaseModules.query(
                            window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'pk_history'),
                            window.firebaseModules.orderBy('timestamp', 'desc'),
                            window.firebaseModules.limit(100)
                        );
                        const snap = await window.firebaseModules.getDocs(q);
                        setLogs(snap.docs.map(d => d.data()));
                    } catch (e) { console.error(e); setLogs([]); }
                })();
            }, [db]);

            const WINNER_LABEL = {
                attacker: { text: "攻方勝", cls: "bg-red-100 text-red-700" },
                defender: { text: "守方勝", cls: "bg-blue-100 text-blue-700" },
                draw: { text: "平手", cls: "bg-emerald-100 text-emerald-700" },
                both_wrong: { text: "兩敗俱傷", cls: "bg-slate-200 text-slate-600" }
            };
            const fmtTime = (ts) => {
                const d = new Date(ts);
                return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
            };
            const shown = !Array.isArray(logs) ? [] : (onlyMyClass ? logs.filter(l => l.attackerClass === classId || l.defenderClass === classId) : logs);

            return (
                <div>
                    <div className="flex justify-between items-center mb-4 flex-wrap gap-2">
                        <h3 className="font-bold text-slate-700"><i className="fas fa-khanda"></i> PK 戰報（最近 100 場）</h3>
                        <div className="flex gap-2">
                            <button onClick={() => setOnlyMyClass(true)} className={`px-4 py-1.5 rounded-full text-xs font-bold ${onlyMyClass ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}>只看 {classId}班</button>
                            <button onClick={() => setOnlyMyClass(false)} className={`px-4 py-1.5 rounded-full text-xs font-bold ${!onlyMyClass ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-500'}`}>全校</button>
                        </div>
                    </div>
                    {logs === null && <div className="text-center py-10 text-slate-400"><i className="fas fa-circle-notch fa-spin text-3xl"></i></div>}
                    {Array.isArray(logs) && shown.length === 0 && (
                        <div className="text-center text-slate-400 py-10">還沒有 PK 紀錄（此功能上線後的新對戰才會記錄）</div>
                    )}
                    {Array.isArray(logs) && shown.length > 0 && (
                        <div className="overflow-x-auto border rounded-lg bg-white shadow-inner">
                            <table className="w-full text-xs text-left">
                                <thead className="bg-slate-50 text-slate-500 sticky top-0">
                                    <tr>
                                        <th className="p-2 border-b whitespace-nowrap">時間</th>
                                        <th className="p-2 border-b">攻方</th>
                                        <th className="p-2 border-b">守方</th>
                                        <th className="p-2 border-b w-16 text-center">攻/守</th>
                                        <th className="p-2 border-b">題目</th>
                                        <th className="p-2 border-b w-20 text-center">結果</th>
                                        <th className="p-2 border-b w-14 text-center">傷害</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {shown.map((l, i) => {
                                        const w = WINNER_LABEL[l.winner] || { text: l.winner, cls: "bg-slate-100 text-slate-500" };
                                        return (
                                            <tr key={i} className="hover:bg-blue-50">
                                                <td className="p-2 text-slate-400 whitespace-nowrap">{fmtTime(l.timestamp)}</td>
                                                <td className="p-2 font-bold text-slate-700 whitespace-nowrap">{l.attackerClass}班{l.attackerSeat}號 {l.attackerName}</td>
                                                <td className="p-2 font-bold text-slate-700 whitespace-nowrap">{l.defenderClass}班{l.defenderSeat}號 {l.defenderName}</td>
                                                <td className="p-2 text-center font-mono whitespace-nowrap">
                                                    <span className={l.attackerCorrect ? "text-green-600" : "text-red-500"}>{l.attackerCorrect ? "✓" : "✗"}</span>
                                                    /
                                                    <span className={l.defenderCorrect ? "text-green-600" : "text-red-500"}>{l.defenderCorrect ? "✓" : "✗"}</span>
                                                </td>
                                                <td className="p-2 text-slate-500"><span className="text-blue-500 font-bold">{l.chapter}</span> {l.question}</td>
                                                <td className="p-2 text-center"><span className={`px-2 py-0.5 rounded font-bold ${w.cls}`}>{w.text}</span></td>
                                                <td className="p-2 text-center font-mono text-red-500">{l.damage > 0 ? `-${l.damage}` : "—"}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    )}
                    <div className="text-xs text-slate-400 mt-2">戰報從功能上線起開始記錄；「傷害」為敗方被扣的 HP（平手不扣血、兩敗俱傷各扣 30）。</div>
                </div>
            );
        };

        // ============================================================
        // Teacher Dashboard
        // ============================================================
        const TeacherDashboard = ({ db, classId, onLogout }) => {
            const [tab, setTab] = useState('students');
            const [students, setStudents] = useState([]);
            const [questions, setQuestions] = useState([]);
            const [qInput, setQInput] = useState("");
            const [msg, setMsg] = useState(null);
            const [editStudent, setEditStudent] = useState(null);
            const [historyStudent, setHistoryStudent] = useState(null);
            const [encourageStudent, setEncourageStudent] = useState(null);
            const [goldAmount, setGoldAmount] = useState(100);
            const [resetTargetClass, setResetTargetClass] = useState("all");
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [resetConfirmCode, setResetConfirmCode] = useState("");
            const [pdfPages, setPdfPages] = useState(null);
            const [downloading, setDownloading] = useState(false);
            const pdfPageRefs = useRef([]);

            useEffect(() => {
                if (!pdfPages) return;
                let cancelled = false;
                (async () => {
                    await new Promise(r => setTimeout(r, 400));
                    if (cancelled) return;
                    const elements = pdfPageRefs.current.filter(r => r);
                    if (elements.length === 0) {
                        setPdfPages(null); setDownloading(false); return;
                    }
                    try {
                        await renderMultiPagePdf(elements, pdfPages.filename);
                    } catch (e) {
                        console.error(e);
                        alert("PDF 產生失敗：" + (e.message || e));
                    }
                    pdfPageRefs.current = [];
                    setPdfPages(null);
                    setDownloading(false);
                })();
                return () => { cancelled = true; };
            }, [pdfPages]);

            const fetchAllUsers = async () => {
                let all = [];
                for (let c of CLASSES) {
                    const q = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', c, 'users');
                    const snap = await window.firebaseModules.getDocs(q);
                    snap.forEach(d => all.push({ ...d.data(), class: c, id: d.id }));
                }
                return all;
            };

            const downloadOneStudent = async (student) => {
                if (downloading) return;
                setDownloading(true);
                try {
                    const all = await fetchAllUsers();
                    all.sort((a, b) => (b.xp || 0) - (a.xp || 0));
                    const enriched = { ...student, class: student.class || classId };
                    const rank = all.findIndex(u => u.id === student.id) + 1;
                    setPdfPages({
                        filename: `${enriched.class}班_${enriched.seat}號_${enriched.name}_學習報告.pdf`,
                        pages: [<StudentReportCard key="s" student={enriched} classRank={rank} totalStudents={all.length} />]
                    });
                } catch (e) { setDownloading(false); alert(e.message); }
            };

            const downloadClassReport = async () => {
                if (downloading) return;
                setDownloading(true);
                try {
                    const all = await fetchAllUsers();
                    const ranked = [...all].sort((a, b) => (b.xp || 0) - (a.xp || 0));
                    const sortedClass = [...students].sort((a, b) => parseInt(a.seat) - parseInt(b.seat));
                    const pages = [
                        <ClassReportCover key="cover" classId={classId} students={sortedClass} />,
                        ...sortedClass.map(s => {
                            const enriched = { ...s, class: classId };
                            const rank = ranked.findIndex(u => u.id === s.id) + 1;
                            return <StudentReportCard key={s.id} student={enriched} classRank={rank} totalStudents={all.length} />;
                        })
                    ];
                    setPdfPages({ filename: `${classId}班_完整學習報告.pdf`, pages });
                } catch (e) { setDownloading(false); alert(e.message); }
            };

            const downloadGradeReport = async () => {
                if (downloading) return;
                setDownloading(true);
                try {
                    const all = await fetchAllUsers();
                    setPdfPages({
                        filename: `全年級_學習統計報告.pdf`,
                        pages: [<GradeReportCover key="grade" allUsers={all} />]
                    });
                } catch (e) { setDownloading(false); alert(e.message); }
            };

            const resetStudentPassword = async (student) => {
                if (!confirm(`確定要將 ${student.name} 的密碼重設為 "1234"？`)) return;
                await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', student.id), { password: "1234" });
                setMsg(`已重設 ${student.name} 的密碼為 1234`);
            };

            useEffect(() => {
                if (!db) return;
                const unsubS = window.firebaseModules.onSnapshot(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', classId, 'users'),
                    (snap) => { setStudents(snap.docs.map(d => ({ id: d.id, ...d.data() }))); });
                const unsubQ = window.firebaseModules.onSnapshot(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'),
                    (snap) => { setQuestions(snap.docs.map(d => ({ id: d.id, ...d.data() }))); });
                return () => { unsubS(); unsubQ(); };
            }, [db]);

            const handleSaveStats = async (newStats) => {
                if (!editStudent) return;
                await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', editStudent.id), newStats);
                setEditStudent(null);
                setMsg("數值已更新");
            };
            const sendGold = async (studentId, studentName) => {
                const amount = parseInt(goldAmount);
                if (isNaN(amount) || amount === 0) return setMsg("請輸入有效金額");
                await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', studentId), {
                    gold: window.firebaseModules.increment(amount)
                });
                setMsg(`成功發送 ${amount} 金幣給 ${studentName}`);
            };
            const deleteQuestion = async (id) => {
                if (!confirm("確定要刪除嗎？")) return;
                await window.firebaseModules.deleteDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'questions', id));
            };

            // 題目上傳格式：章節[Tab]題目[Tab]選項A[Tab]選項B[Tab]選項C[Tab]選項D[Tab]正解[Tab]圖片URL[Tab]金幣[Tab]HP[Tab]ATK[Tab]DEF
            const uploadQuestions = async () => {
                const lines = qInput.trim().split('\n');
                const colRef = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                // 分批（Firestore 每批上限 500，取 400 保守值）
                let count = 0, failed = 0, batches = [], current = window.firebaseModules.writeBatch(db), inBatch = 0;
                lines.forEach(line => {
                    const p = line.split('\t');
                    if (p.length < 7) { failed++; return; }
                    if (!ALL_CHAPTERS.includes(p[0].trim())) { failed++; return; }
                    if (!["A", "B", "C", "D"].includes(p[6].trim().toUpperCase())) { failed++; return; }
                    current.set(window.firebaseModules.doc(colRef), {
                        chapter: p[0].trim(),
                        question: p[1].trim(),
                        options: { A: p[2].trim(), B: p[3].trim(), C: p[4].trim(), D: p[5].trim() },
                        answer: p[6].trim().toUpperCase(),
                        imageUrl: (p[7] || "").trim() || null,
                        gold: parseInt(p[8]) || 10,
                        hp: parseInt(p[9]) || 0,
                        atk: parseInt(p[10]) || 0,
                        def: parseInt(p[11]) || 0,
                        timestamp: Date.now()
                    });
                    count++; inBatch++;
                    if (inBatch >= 400) { batches.push(current); current = window.firebaseModules.writeBatch(db); inBatch = 0; }
                });
                if (inBatch > 0) batches.push(current);
                for (const b of batches) await b.commit();
                setMsg(`成功上傳 ${count} 題（失敗 ${failed} 行）`);
                setQInput("");
            };

            const uploadQuestionsJson = async (file) => {
                if (!file) return;
                try {
                    const text = await file.text();
                    const arr = JSON.parse(text);
                    if (!Array.isArray(arr)) { setMsg("JSON 必須是陣列"); return; }
                    const colRef = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                    let count = 0, failed = 0, batches = [], current = window.firebaseModules.writeBatch(db), inBatch = 0;
                    for (const q of arr) {
                        if (!q || typeof q !== 'object') { failed++; continue; }
                        if (!ALL_CHAPTERS.includes(q.chapter)) { failed++; continue; }
                        if (!q.options || !["A", "B", "C", "D"].includes((q.answer || "").toUpperCase())) { failed++; continue; }
                        current.set(window.firebaseModules.doc(colRef), {
                            chapter: q.chapter,
                            question: q.question || "",
                            options: { A: q.options.A || "", B: q.options.B || "", C: q.options.C || "", D: q.options.D || "" },
                            answer: q.answer.toUpperCase(),
                            imageUrl: q.imageUrl || null,
                            gold: parseInt(q.gold) || 10,
                            hp: parseInt(q.hp) || 0,
                            atk: parseInt(q.atk) || 0,
                            def: parseInt(q.def) || 0,
                            difficulty: q.difficulty || null,
                            section: q.section || null,
                            timestamp: Date.now()
                        });
                        count++; inBatch++;
                        if (inBatch >= 400) { batches.push(current); current = window.firebaseModules.writeBatch(db); inBatch = 0; }
                    }
                    if (inBatch > 0) batches.push(current);
                    for (const b of batches) await b.commit();
                    setMsg(`JSON 上傳成功 ${count} 題（失敗 ${failed} 筆）`);
                } catch (e) {
                    setMsg("JSON 解析或上傳失敗：" + e.message);
                }
            };

            const executeReset = async () => {
                if (resetConfirmCode !== "RESET") {
                    setMsg("確認碼錯誤，操作取消");
                    setShowResetConfirm(false);
                    return;
                }
                setShowResetConfirm(false);
                setMsg("正在收集要刪除的資料...");
                try {
                    const fm = window.firebaseModules;
                    const classesToReset = resetTargetClass === 'all' ? CLASSES : [resetTargetClass];
                    let allRefs = [];
                    // 1. 學生文件 + 每位學生的答題紀錄（quiz_history 子集合不會自動連帶刪除）
                    for (let c of classesToReset) {
                        const snap = await fm.getDocs(fm.collection(db, 'artifacts', APP_ID, 'classes', c, 'users'));
                        for (const d of snap.docs) {
                            const histSnap = await fm.getDocs(fm.collection(db, 'artifacts', APP_ID, 'classes', c, 'users', d.id, 'quiz_history'));
                            histSnap.forEach(h => allRefs.push(h.ref));
                            allRefs.push(d.ref);
                        }
                    }
                    // 2. 進行中的 PK（新學期沒有對象了）
                    const pkSnap = await fm.getDocs(fm.collection(db, 'artifacts', APP_ID, 'public', 'data', 'active_pks'));
                    pkSnap.forEach(d => {
                        const p = d.data();
                        if (resetTargetClass === 'all' || p.attackerClass === resetTargetClass || p.defenderClass === resetTargetClass) allRefs.push(d.ref);
                    });
                    // 3. 未讀的 PK 戰報通知（targetId 格式為「班-座號」）
                    const notifSnap = await fm.getDocs(fm.collection(db, 'artifacts', APP_ID, 'public', 'data', 'notifications'));
                    notifSnap.forEach(d => {
                        const t = d.data().targetId || "";
                        if (resetTargetClass === 'all' || t.startsWith(resetTargetClass + "-")) allRefs.push(d.ref);
                    });
                    // 4. PK 戰報紀錄
                    const pkhSnap = await fm.getDocs(fm.collection(db, 'artifacts', APP_ID, 'public', 'data', 'pk_history'));
                    pkhSnap.forEach(d => {
                        const p = d.data();
                        if (resetTargetClass === 'all' || p.attackerClass === resetTargetClass || p.defenderClass === resetTargetClass) allRefs.push(d.ref);
                    });
                    // 分批刪除（Firestore 每批上限 500，取 400 保守值）
                    let deleted = 0;
                    for (let i = 0; i < allRefs.length; i += 400) {
                        const chunk = allRefs.slice(i, i + 400);
                        const batch = fm.writeBatch(db);
                        chunk.forEach(r => batch.delete(r));
                        await batch.commit();
                        deleted += chunk.length;
                        setMsg(`刪除中... ${deleted}/${allRefs.length}`);
                    }
                    // 同步重置 globalLimits
                    if (resetTargetClass === 'all') {
                        await fm.setDoc(fm.doc(db, 'artifacts', APP_ID, 'public', 'data', 'globalLimits', 'main'), {}, { merge: false });
                    }
                    setMsg(`重置完成：共刪除 ${deleted} 筆（學生資料、答題紀錄、PK、通知）`);
                } catch (e) { setMsg("重置失敗: " + e.message); }
            };

            const activeInfo = getActiveChapters();

            return (
                <div className="max-w-6xl mx-auto p-4">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h1 className="text-3xl font-black text-white drop-shadow-md">老師中控台 ({classId}班) <span className="text-xs font-normal text-white/40">{APP_VERSION}</span></h1>
                            <div className="text-xs text-yellow-300 mt-1">目前範圍：{activeInfo.label}{activeInfo.maintenance && "（維護期，學生無法答題）"}</div>
                        </div>
                        <button onClick={onLogout} className="bg-slate-700/80 text-white px-4 py-2 rounded font-bold hover:bg-slate-600">登出</button>
                    </div>
                    <div className="glass-panel overflow-hidden mb-6 min-h-[600px] flex flex-col">
                        <div className="flex border-b border-slate-200 overflow-x-auto shrink-0">
                            {[
                                { id: 'analysis', label: '答題分析', icon: 'fa-chart-pie' },
                                { id: 'students', label: '學生管理', icon: 'fa-users' },
                                { id: 'pk', label: 'PK 戰報', icon: 'fa-khanda' },
                                { id: 'rank', label: '全校排行', icon: 'fa-trophy' },
                                { id: 'questions', label: '題庫管理', icon: 'fa-book-open' },
                                { id: 'reports', label: '學習報告', icon: 'fa-file-pdf' }
                            ].map(t => (
                                <button key={t.id} onClick={() => setTab(t.id)} className={`flex-1 min-w-[120px] p-4 font-bold transition flex items-center justify-center gap-2 ${tab === t.id ? 'bg-blue-50 text-blue-600 border-b-4 border-blue-600' : 'text-slate-500 hover:bg-slate-50'}`}>
                                    <i className={`fas ${t.icon}`}></i> {t.label}
                                </button>
                            ))}
                        </div>

                        <div className="p-6 bg-white/80 grow overflow-y-auto">
                            {tab === 'analysis' && <QuizAnalysisView students={students} db={db} classId={classId} />}

                            {tab === 'students' && (
                                <div>
                                    <div className="mb-4 bg-yellow-50 p-3 rounded-lg border border-yellow-200 flex items-center gap-3">
                                        <div className="bg-yellow-100 p-2 rounded-full text-yellow-600"><i className="fas fa-coins"></i></div>
                                        <label className="font-bold text-sm text-yellow-800">快速發金幣面額：</label>
                                        <input type="number" value={goldAmount} onChange={e => setGoldAmount(e.target.value)} className="border p-2 w-24 rounded font-bold text-right" />
                                    </div>
                                    {(() => {
                                        // 缺號提示：列出 1~最大已註冊座號之間還沒註冊的座號
                                        const seatNums = students.map(s => parseInt(s.seat)).filter(n => !isNaN(n) && n > 0);
                                        const maxSeat = seatNums.length > 0 ? Math.max(...seatNums) : 0;
                                        const missing = [];
                                        for (let i = 1; i <= maxSeat; i++) if (!seatNums.includes(i)) missing.push(i);
                                        return (
                                            <div className="mb-4 text-sm bg-blue-50 border border-blue-200 rounded-lg p-3 text-blue-800">
                                                <b>已註冊 {students.length} 人</b>
                                                {maxSeat > 0 && missing.length > 0 && <span>｜1~{maxSeat} 號中<b className="text-red-600">尚未註冊：{missing.join("、")} 號</b></span>}
                                                {maxSeat > 0 && missing.length === 0 && <span>｜1~{maxSeat} 號全數到齊 🎉</span>}
                                                <div className="text-xs text-blue-500 mt-1">（比最大已註冊座號還後面的缺號無法判斷，例如最後幾號都還沒註冊）</div>
                                            </div>
                                        );
                                    })()}
                                    <table className="w-full text-sm text-left border-collapse">
                                        <thead className="bg-slate-100 text-slate-600 uppercase tracking-wider sticky top-0 shadow-sm">
                                            <tr>
                                                <th className="p-3 border-b">座號</th>
                                                <th className="p-3 border-b">姓名</th>
                                                <th className="p-3 border-b">暱稱</th>
                                                <th className="p-3 border-b text-right">金幣</th>
                                                <th className="p-3 border-b text-center">屬性(含裝備)</th>
                                                <th className="p-3 border-b text-center">答對率</th>
                                                <th className="p-3 border-b text-center">PK 勝/負/平</th>
                                                <th className="p-3 border-b text-center">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {[...students].sort((a, b) => parseInt(a.seat) - parseInt(b.seat)).map(s => {
                                                const eff = getEffectiveStats(s);
                                                const acc = (s.totalQuizQuestions || 0) > 0 ? Math.round((s.totalQuizCorrect / s.totalQuizQuestions) * 100) : null;
                                                return (
                                                    <tr key={s.id} className="hover:bg-blue-50">
                                                        <td className="p-3 font-bold text-slate-700">{s.seat}</td>
                                                        <td className="p-3 font-bold">{s.name}</td>
                                                        <td className="p-3 text-slate-500">{s.nickname || "-"}</td>
                                                        <td className="p-3 text-right font-mono text-yellow-600 font-bold">{s.gold || 0}</td>
                                                        <td className="p-3 text-center font-mono text-xs">HP{eff.maxHp}/A{eff.atk}/D{eff.def}</td>
                                                        <td className="p-3 text-center font-mono text-xs">{acc !== null ? <span className={`px-2 py-1 rounded font-bold ${acc < 60 ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-600'}`}>{acc}% ({s.totalQuizQuestions})</span> : <span className="text-slate-300">-</span>}</td>
                                                        <td className="p-3 text-center font-mono text-xs"><span className="text-green-600 font-bold">{s.pkWins || 0}</span>/<span className="text-red-500 font-bold">{s.pkLosses || 0}</span>/<span className="text-slate-500">{s.pkDraws || 0}</span></td>
                                                        <td className="p-3 flex justify-center gap-2">
                                                            <button onClick={() => setEditStudent(s)} className="bg-white border border-slate-300 text-slate-600 px-3 py-1 rounded text-xs font-bold hover:bg-slate-50">調整</button>
                                                            <button onClick={() => sendGold(s.id, s.name)} className="bg-yellow-400 text-yellow-900 px-3 py-1 rounded text-xs font-bold hover:bg-yellow-500 border border-yellow-500">發金幣</button>
                                                            <button onClick={() => setHistoryStudent(s)} className="bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs font-bold hover:bg-blue-200"><i className="fas fa-history"></i> 紀錄</button>
                                                            <button onClick={() => setEncourageStudent(s)} className="bg-pink-100 text-pink-700 px-3 py-1 rounded text-xs font-bold hover:bg-pink-200"><i className="fas fa-envelope-heart"></i> 送鼓勵</button>
                                                            <button onClick={() => resetStudentPassword(s)} className="bg-purple-100 text-purple-700 px-3 py-1 rounded text-xs font-bold hover:bg-purple-200"><i className="fas fa-key"></i> 重設密碼</button>
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                    <div className="mt-8 pt-4 border-t border-slate-200 bg-red-50 p-4 rounded-lg flex items-center gap-4">
                                        <div className="text-red-600 text-sm font-bold"><i className="fas fa-exclamation-triangle"></i> 資料重置區：</div>
                                        <select value={resetTargetClass} onChange={e => setResetTargetClass(e.target.value)} className="border p-2 rounded text-sm">
                                            <option value="all">全校</option>
                                            {CLASSES.map(c => <option key={c} value={c}>{c}班</option>)}
                                        </select>
                                        <button onClick={() => setShowResetConfirm(true)} className="bg-red-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-red-700">執行重置</button>
                                    </div>
                                </div>
                            )}

                            {tab === 'pk' && <PKHistoryView db={db} classId={classId} />}

                            {tab === 'rank' && <LeaderboardView db={db} isTeacherMode={true} />}

                            {tab === 'questions' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                                    <div className="lg:col-span-1 border-r pr-4 flex flex-col">
                                        <h3 className="font-bold mb-4 text-slate-700"><i className="fas fa-upload"></i> 上傳題目</h3>
                                        <div className="bg-blue-50 p-3 text-xs mb-2 text-blue-800 rounded border border-blue-200 leading-relaxed">
                                            <strong>格式（Tab 分隔，12 欄）：</strong><br />
                                            章節｜題目｜選項A｜選項B｜選項C｜選項D｜正解｜圖片URL｜金幣｜HP｜ATK｜DEF<br />
                                            章節：8上-1 / 8上-2 / ... / 8下-6
                                        </div>
                                        <textarea value={qInput} onChange={e => setQInput(e.target.value)} className="w-full h-40 border rounded p-2 mb-2 font-mono text-sm resize-none" placeholder="在此貼上（從 Excel 複製）..."></textarea>
                                        <button onClick={uploadQuestions} className="w-full bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 shadow">確認上傳（TSV）</button>
                                        <div className="mt-3 pt-3 border-t border-slate-200">
                                            <div className="text-xs text-slate-500 mb-2 leading-relaxed">
                                                <strong>或直接上傳 JSON 檔：</strong><br />
                                                （題庫資料夾的 8-1.json、8-2.json…）
                                            </div>
                                            <label className="block w-full bg-emerald-600 text-white px-4 py-2 rounded font-bold hover:bg-emerald-700 shadow cursor-pointer text-center">
                                                <i className="fas fa-file-code"></i> 選擇 JSON 檔案
                                                <input type="file" accept=".json,application/json" className="hidden" onChange={e => { uploadQuestionsJson(e.target.files[0]); e.target.value = ''; }} />
                                            </label>
                                        </div>
                                        <div className="mt-auto pt-4 border-t">
                                            <button onClick={() => confirm("確定清空所有題目？") && window.firebaseModules.getDocs(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions')).then(s => { const b = window.firebaseModules.writeBatch(db); s.docs.forEach(d => b.delete(d.ref)); b.commit(); setMsg("已清空"); })} className="w-full border border-red-200 text-red-500 px-4 py-2 rounded text-sm hover:bg-red-50">⚠️ 清空所有題目</button>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 flex flex-col h-full overflow-hidden">
                                        <h3 className="font-bold mb-4 text-slate-700 flex justify-between items-center">
                                            <span><i className="fas fa-list"></i> 已上傳列表</span>
                                            <span className="text-xs bg-slate-200 px-2 py-1 rounded text-slate-600">{questions.length} 題</span>
                                        </h3>
                                        <div className="overflow-y-auto border rounded-lg bg-white shadow-inner">
                                            <table className="w-full text-xs text-left">
                                                <thead className="bg-slate-50 sticky top-0 text-slate-500">
                                                    <tr>
                                                        <th className="p-3 border-b w-20">章節</th>
                                                        <th className="p-3 border-b">題目</th>
                                                        <th className="p-3 border-b w-16">答案</th>
                                                        <th className="p-3 border-b w-20 text-center">操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {questions.sort((a, b) => (a.chapter || "").localeCompare(b.chapter || "")).map(q => (
                                                        <tr key={q.id} className="hover:bg-blue-50">
                                                            <td className="p-3 font-bold text-blue-600">{q.chapter || "—"}</td>
                                                            <td className="p-3 text-slate-700">{q.question}</td>
                                                            <td className="p-3 text-green-600 font-bold">{q.answer}</td>
                                                            <td className="p-3 text-center">
                                                                <button onClick={() => deleteQuestion(q.id)} className="text-red-400 hover:text-red-600"><i className="fas fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {tab === 'reports' && (
                                <div className="space-y-6">
                                    <div className="bg-blue-50 p-4 rounded-lg border border-blue-200">
                                        <h3 className="font-bold text-blue-900 mb-3 flex items-center gap-2"><i className="fas fa-file-pdf"></i> 班級 & 全年級報告</h3>
                                        <div className="flex gap-2 flex-wrap">
                                            <button onClick={downloadClassReport} disabled={downloading} className="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 disabled:opacity-50">
                                                <i className="fas fa-school"></i> 下載本班完整報告（封面 + 各生明細）
                                            </button>
                                            <button onClick={downloadGradeReport} disabled={downloading} className="bg-purple-600 text-white px-4 py-2 rounded font-bold hover:bg-purple-700 disabled:opacity-50">
                                                <i className="fas fa-graduation-cap"></i> 下載全年級報告（含各班比較）
                                            </button>
                                        </div>
                                        <p className="text-xs text-blue-700 mt-2">本班報告 = 1 頁封面 + {students.length} 頁學生明細（多人數時可能需 30 秒以上）。產生中請勿關閉視窗。</p>
                                    </div>

                                    <div>
                                        <h3 className="font-bold text-slate-700 mb-3 flex items-center gap-2"><i className="fas fa-user-graduate"></i> 個別學生報告</h3>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                            {[...students].sort((a, b) => parseInt(a.seat) - parseInt(b.seat)).map(s => {
                                                const acc = (s.totalQuizQuestions || 0) > 0 ? Math.round(((s.totalQuizCorrect || 0) / s.totalQuizQuestions) * 100) : null;
                                                return (
                                                    <button key={s.id} onClick={() => downloadOneStudent(s)} disabled={downloading} className="bg-white border p-3 rounded hover:bg-emerald-50 hover:border-emerald-400 text-left disabled:opacity-50 transition">
                                                        <div className="text-sm font-bold text-slate-800">{s.seat}號 {s.name}</div>
                                                        <div className="text-xs text-slate-400">{s.nickname || '—'} {acc !== null && `· 答對率 ${acc}%`}</div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {downloading && (
                                        <div className="text-center text-blue-600 font-bold animate-pulse bg-blue-50 p-4 rounded border border-blue-200">
                                            <i className="fas fa-spinner fa-spin mr-2"></i> PDF 產生中... 請稍候，產生完成後會自動下載
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {pdfPages && (
                        <div style={{ position: 'fixed', left: -99999, top: 0, zIndex: -1 }}>
                            {pdfPages.pages.map((page, i) => (
                                <div key={i} ref={el => pdfPageRefs.current[i] = el}>
                                    {page}
                                </div>
                            ))}
                        </div>
                    )}

                    {msg && <div className="fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl font-bold flex items-center gap-2"><i className="fas fa-info-circle"></i> {msg}<button onClick={() => setMsg(null)} className="ml-2 text-white/70 hover:text-white">×</button></div>}
                    {editStudent && <EditStatsModal student={editStudent} onClose={() => setEditStudent(null)} onSave={handleSaveStats} />}
                    {historyStudent && <QuizHistoryModal student={historyStudent} db={db} classId={classId} onClose={() => setHistoryStudent(null)} />}
                    {encourageStudent && <EncourageModal student={encourageStudent} db={db} classId={classId} onClose={() => setEncourageStudent(null)} setMsg={setMsg} />}

                    {showResetConfirm && (
                        <Modal title="⚠️ 危險操作：重置資料" onClose={() => setShowResetConfirm(false)}>
                            <div className="space-y-4 text-center">
                                <div className="text-red-600 font-bold text-lg bg-red-50 p-4 rounded-lg border border-red-200">
                                    即將刪除 <span className="underline">{resetTargetClass === 'all' ? '全校' : `${resetTargetClass}班`}</span> 所有學生資料、答題紀錄、PK 資料與通知{resetTargetClass === 'all' && "，並重置全校升級石銷售記錄"}。
                                    <br />（題庫會保留）此操作無法復原！
                                </div>
                                <p className="text-slate-600 text-sm">請輸入 <strong>RESET</strong> 以確認：</p>
                                <input value={resetConfirmCode} onChange={e => setResetConfirmCode(e.target.value.toUpperCase())} className="w-full p-3 border-2 border-red-300 rounded text-center font-bold tracking-widest uppercase focus:border-red-600 outline-none" placeholder="輸入 RESET" />
                                <div className="flex gap-2 justify-center mt-4">
                                    <button onClick={() => setShowResetConfirm(false)} className="px-4 py-2 bg-slate-200 rounded font-bold text-slate-600">取消</button>
                                    <button onClick={executeReset} disabled={resetConfirmCode !== 'RESET'} className="px-6 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 disabled:opacity-50">確認刪除</button>
                                </div>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        // ============================================================
        // App
        // ============================================================
        const App = () => {
            const { db, ready, error } = useFirebase();
            const [classId, setClassId] = useState(null);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading');

            useEffect(() => {
                if (!ready || !db) return;
                const savedClass = safeStorage.get('RPG_CLASS');
                const savedUid = safeStorage.get('RPG_UID');
                (async () => {
                    if (savedClass) {
                        setClassId(savedClass);
