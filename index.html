                    )}
                    <div className="mt-4 text-right">
                        <button onClick={onClose} className="text-slate-500 hover:text-slate-700 text-sm underline">關閉視窗</button>
                    </div>
                </Modal>
            );
        };

        // --- Quiz Analysis View ---
        const QuizAnalysisView = ({ students }) => {
            const activeStudents = useMemo(() => students.filter(s => (s.totalQuizQuestions || 0) > 0), [students]);

            const totalQuestions = activeStudents.reduce((acc, s) => acc + (s.totalQuizQuestions || 0), 0);
            const totalCorrect = activeStudents.reduce((acc, s) => acc + (s.totalQuizCorrect || 0), 0);
            const classAccuracy = totalQuestions > 0 ? ((totalCorrect / totalQuestions) * 100).toFixed(1) : 0;

            const strugglingStudents = useMemo(() => {
                return activeStudents
                    .filter(s => {
                        const acc = (s.totalQuizCorrect || 0) / (s.totalQuizQuestions || 1);
                        return acc < 0.6;
                    })
                    .sort((a,b) => parseInt(a.seat) - parseInt(b.seat));
            }, [activeStudents]);

            const topStudents = useMemo(() => {
                return activeStudents
                    .filter(s => {
                        const acc = (s.totalQuizCorrect || 0) / (s.totalQuizQuestions || 1);
                        return acc >= 0.85 && s.totalQuizQuestions > 5;
                    })
                    .sort((a,b) => {
                        const accA = (a.totalQuizCorrect||0)/(a.totalQuizQuestions||1);
                        const accB = (b.totalQuizCorrect||0)/(b.totalQuizQuestions||1);
                        return accB - accA;
                    });
            }, [activeStudents]);

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div className="bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="relative z-10">
                                <h4 className="text-blue-100 font-bold mb-2 uppercase tracking-widest text-xs">班級平均答對率</h4>
                                <div className="text-5xl font-black">{classAccuracy}%</div>
                                <div className="mt-2 text-sm text-blue-200">
                                    <i className="fas fa-check-circle"></i> 總答對題數: {totalCorrect}
                                </div>
                            </div>
                            <i className="fas fa-chart-line absolute right-4 bottom-4 text-9xl text-white opacity-10"></i>
                        </div>
                        <div className="bg-gradient-to-br from-purple-500 to-pink-600 rounded-xl p-6 text-white shadow-lg relative overflow-hidden">
                            <div className="relative z-10">
                                <h4 className="text-purple-100 font-bold mb-2 uppercase tracking-widest text-xs">總答題熱度</h4>
                                <div className="text-5xl font-black">{totalQuestions}</div>
                                <div className="mt-2 text-sm text-purple-200">
                                    <i className="fas fa-user-check"></i> 參與人數: {activeStudents.length} / {students.length}
                                </div>
                            </div>
                            <i className="fas fa-fire absolute right-4 bottom-4 text-9xl text-white opacity-10"></i>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-red-50 border border-red-100 rounded-xl p-4 shadow-sm">
                            <h4 className="font-bold text-red-800 mb-4 flex items-center gap-2 border-b border-red-200 pb-2">
                                <i className="fas fa-exclamation-circle text-red-500"></i> 需要關注 (答對率 &lt; 60%)
                            </h4>
                            {strugglingStudents.length === 0 ? (
                                <div className="text-center text-slate-400 py-8 text-sm">目前沒有落後的學生，太棒了！</div>
                            ) : (
                                <div className="space-y-2 max-h-[300px] overflow-y-auto">
                                    {strugglingStudents.map(s => (
                                        <div key={s.id} className="bg-white p-3 rounded-lg border border-red-100 flex justify-between items-center hover:shadow-sm transition">
                                            <div className="flex items-center gap-3">
                                                <div className="font-bold text-slate-700 w-8 text-center">{s.seat}</div>
                                                <div>
                                                    <div className="font-bold text-sm text-slate-800">{s.name}</div>
                                                    <div className="text-xs text-slate-500">{s.totalQuizCorrect} / {s.totalQuizQuestions} 題</div>
                                                </div>
                                            </div>
                                            <div className="font-bold text-red-500 bg-red-50 px-2 py-1 rounded text-sm">
                                                {Math.round((s.totalQuizCorrect/s.totalQuizQuestions)*100)}%
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-4 shadow-sm">
                            <h4 className="font-bold text-emerald-800 mb-4 flex items-center gap-2 border-b border-emerald-200 pb-2">
                                <i className="fas fa-medal text-emerald-500"></i> 表現優異 (答對率 &gt; 85%)
                            </h4>
                            {topStudents.length === 0 ? (
                                <div className="text-center text-slate-400 py-8 text-sm">還沒有出現學霸...</div>
                            ) : (
                                <div className="space-y-2 max-h-[300px] overflow-y-auto">
                                    {topStudents.map((s, idx) => (
                                        <div key={s.id} className="bg-white p-3 rounded-lg border border-emerald-100 flex justify-between items-center hover:shadow-sm transition">
                                            <div className="flex items-center gap-3">
                                                <div className={`font-black w-6 text-center ${idx===0?'text-yellow-500':idx===1?'text-slate-400':idx===2?'text-orange-700':'text-slate-300'}`}>#{idx+1}</div>
                                                <div className="font-bold text-slate-700 w-6 text-center">{s.seat}</div>
                                                <div className="font-bold text-sm text-slate-800">{s.name}</div>
                                            </div>
                                            <div className="font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded text-sm">
                                                {Math.round((s.totalQuizCorrect/s.totalQuizQuestions)*100)}%
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const TeacherDashboard = ({ db, classId, onLogout }) => {
            const [tab, setTab] = useState('students');
            const [students, setStudents] = useState([]);
            const [questions, setQuestions] = useState([]);
            const [coupons, setCoupons] = useState([]);
            const [qInput, setQInput] = useState("");
            const [cInput, setCInput] = useState("");
            const [msg, setMsg] = useState(null);

            const [editStudent, setEditStudent] = useState(null);
            const [historyStudent, setHistoryStudent] = useState(null);
            const [editItem, setEditItem] = useState(null);
            const [editType, setEditType] = useState(null);
            const [goldAmount, setGoldAmount] = useState(100);

            const [resetTargetClass, setResetTargetClass] = useState("all");
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [resetConfirmCode, setResetConfirmCode] = useState("");

            useEffect(() => {
                if(!db) return;
                const unsubS = window.firebaseModules.onSnapshot(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', classId, 'users'),
                    (snap) => {
                        const list = [];
                        snap.forEach(d => list.push({id:d.id, ...d.data()}));
                        setStudents(list);
                    });
                const unsubQ = window.firebaseModules.onSnapshot(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions'),
                    (snap) => {
                        const list = [];
                        snap.forEach(d => list.push({id:d.id, ...d.data()}));
                        setQuestions(list);
                    });
                const unsubC = window.firebaseModules.onSnapshot(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'coupons'),
                    (snap) => {
                        const list = [];
                        snap.forEach(d => list.push({id:d.id, ...d.data()}));
                        setCoupons(list);
                    });
                return () => { unsubS(); unsubQ(); unsubC(); };
            }, [db]);

            const handleSaveStats = async (newStats) => {
                if(!editStudent) return;
                await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', editStudent.id), newStats);
                setEditStudent(null);
                setMsg("數值已更新");
            };

            const sendGold = async (studentId, studentName) => {
                const amount = parseInt(goldAmount);
                if(isNaN(amount) || amount === 0) return setMsg("請輸入有效的金幣數量");
                try {
                    await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', studentId), {
                        gold: window.firebaseModules.increment(amount)
                    });
                    setMsg(`成功發送 ${amount} 金幣給 ${studentName}`);
                } catch(e) { console.error(e); setMsg("發送失敗"); }
            };

            const deleteItem = async (collectionName, id) => {
                if(!confirm("確定要刪除嗎？")) return;
                await window.firebaseModules.deleteDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'public', 'data', collectionName, id));
            };

            const saveItemEdit = async (collectionName, id, data) => {
                const cleanData = {...data};
                ['gold', 'hp', 'atk', 'def', 'cost'].forEach(k => { if(cleanData[k] !== undefined) cleanData[k] = parseInt(cleanData[k]) || 0; });
                await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'public', 'data', collectionName, id), cleanData);
                setEditItem(null); setEditType(null); setMsg("更新成功");
            };

            const uploadQuestions = async () => {
                const lines = qInput.trim().split('\n');
                const batch = window.firebaseModules.writeBatch(db);
                const colRef = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                let count = 0;
                lines.forEach(line => {
                    const parts = line.split('\t');
                    if(parts.length < 2) return;
                    batch.set(window.firebaseModules.doc(colRef), {
                        question: parts[0], answer: parts[1],
                        gold: parseInt(parts[2])||10, hp: parseInt(parts[3])||0, atk: parseInt(parts[4])||0, def: parseInt(parts[5])||0,
                        timestamp: Date.now()
                    });
                    count++;
                });
                await batch.commit();
                setMsg(`成功上傳 ${count} 題`); setQInput("");
            };

            const uploadCoupons = async () => {
                const lines = cInput.trim().split('\n');
                const batch = window.firebaseModules.writeBatch(db);
                const colRef = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'coupons');
                let count = 0;
                lines.forEach(line => {
                    const parts = line.split('\t');
                    if(parts.length < 3) return;
                    batch.set(window.firebaseModules.doc(colRef), {
                        name: parts[0], desc: parts[1], cost: parseInt(parts[2]),
                        hp: parseInt(parts[3])||0, atk: parseInt(parts[4])||0, def: parseInt(parts[5])||0
                    });
                    count++;
                });
                await batch.commit();
                setMsg(`上傳 ${count} 張兌換券`); setCInput("");
            };

            const executeReset = async () => {
                if (resetConfirmCode !== "RESET") {
                    setMsg("確認碼錯誤，操作取消。");
                    setShowResetConfirm(false);
                    return;
                }

                setShowResetConfirm(false);
                setMsg("正在刪除資料...請勿關閉視窗");

                try {
                    const targetName = resetTargetClass === 'all' ? "全校" : `${resetTargetClass}班`;
                    const classesToReset = resetTargetClass === 'all' ? CLASSES : [resetTargetClass];

                    let allRefs = [];

                    for (let c of classesToReset) {
                        const q = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', c, 'users');
                        const snap = await window.firebaseModules.getDocs(q);
                        snap.forEach(d => allRefs.push(d.ref));
                    }

                    const chunkSize = 400;
                    let deletedCount = 0;

                    for (let i = 0; i < allRefs.length; i += chunkSize) {
                        const chunk = allRefs.slice(i, i + chunkSize);
                        const batch = window.firebaseModules.writeBatch(db);
                        chunk.forEach(ref => batch.delete(ref));
                        await batch.commit();
                        deletedCount += chunk.length;
                    }

                    setMsg(`已重置 ${targetName} 共 ${deletedCount} 筆資料。`);
                } catch(e) {
                    console.error(e);
                    setMsg("重置失敗: " + e.message);
                }
            };

            return (
                <div className="max-w-6xl mx-auto p-4">
                    <div className="flex justify-between items-center mb-6">
                        <h1 className="text-3xl font-black text-white drop-shadow-md">老師中控台 ({classId}班)</h1>
                        <button onClick={onLogout} className="bg-slate-700/80 text-white px-4 py-2 rounded font-bold hover:bg-slate-600 backdrop-blur-sm">登出</button>
                    </div>
                    <div className="glass-panel overflow-hidden mb-6 min-h-[600px] flex flex-col">
                        <div className="flex border-b border-slate-200 overflow-x-auto shrink-0">
                            {[
                                {id:'analysis', label:'答題分析', icon:'fa-chart-pie'},
                                {id:'students', label:'學生管理', icon:'fa-users'},
                                {id:'rank', label:'全校排行', icon:'fa-trophy'},
                                {id:'questions', label:'題庫管理', icon:'fa-book-open'},
                                {id:'coupons', label:'商店兌換券', icon:'fa-tags'}
                            ].map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`flex-1 min-w-[120px] p-4 font-bold transition flex items-center justify-center gap-2 ${tab===t.id?'bg-blue-50 text-blue-600 border-b-4 border-blue-600':'text-slate-500 hover:bg-slate-50'}`}>
                                    <i className={`fas ${t.icon}`}></i> {t.label}
                                </button>
                            ))}
                        </div>

                        <div className="p-6 bg-white/80 grow overflow-y-auto custom-scrollbar">
                            {tab === 'analysis' && <QuizAnalysisView students={students} />}

                            {tab === 'students' && (
                                <div>
                                    <div className="mb-4 bg-yellow-50 p-3 rounded-lg border border-yellow-200 flex items-center gap-3 shadow-sm sticky top-0 z-10">
                                        <div className="bg-yellow-100 p-2 rounded-full text-yellow-600"><i className="fas fa-coins"></i></div>
                                        <label className="font-bold text-sm text-yellow-800">快速發金幣面額:</label>
                                        <input type="number" value={goldAmount} onChange={e=>setGoldAmount(e.target.value)} className="border p-2 w-24 rounded font-bold text-right" />
                                    </div>
                                    <table className="w-full text-sm text-left border-collapse">
                                        <thead className="bg-slate-100 text-slate-600 uppercase tracking-wider sticky top-16 z-10 shadow-sm">
                                            <tr>
                                                <th className="p-3 border-b">座號</th>
                                                <th className="p-3 border-b">姓名</th>
                                                <th className="p-3 border-b">暱稱</th>
                                                <th className="p-3 border-b text-right">金幣</th>
                                                <th className="p-3 border-b text-center">答對率 (答數)</th>
                                                <th className="p-3 border-b text-center">操作</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {[...students].sort((a,b)=>parseInt(a.seat)-parseInt(b.seat)).map(s => (
                                                <tr key={s.id} className="hover:bg-blue-50 transition group">
                                                    <td className="p-3 font-bold text-slate-700">{s.seat}</td>
                                                    <td className="p-3 font-bold">{s.name}</td>
                                                    <td className="p-3 text-slate-500">{s.nickname || "-"}</td>
                                                    <td className="p-3 text-right font-mono text-yellow-600 font-bold">{s.gold}</td>
                                                    <td className="p-3 text-center font-mono text-xs">
                                                        {s.totalQuizQuestions > 0 ? (
                                                            <span className={`px-2 py-1 rounded font-bold ${((s.totalQuizCorrect/s.totalQuizQuestions) < 0.6) ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-600'}`}>
                                                                {Math.round((s.totalQuizCorrect/s.totalQuizQuestions)*100)}% ({s.totalQuizQuestions})
                                                            </span>
                                                        ) : <span className="text-slate-300">-</span>}
                                                    </td>
                                                    <td className="p-3 flex justify-center gap-2 opacity-100">
                                                        <button onClick={()=>setEditStudent(s)} className="bg-white border border-slate-300 text-slate-600 px-3 py-1 rounded text-xs font-bold hover:bg-slate-50 hover:text-blue-600 transition">調整</button>
                                                        <button onClick={()=>sendGold(s.id, s.name)} className="bg-yellow-400 text-yellow-900 px-3 py-1 rounded text-xs font-bold hover:bg-yellow-500 transition shadow-sm border border-yellow-500">發金幣</button>
                                                        <button onClick={()=>setHistoryStudent(s)} className="bg-blue-100 text-blue-700 px-3 py-1 rounded text-xs font-bold hover:bg-blue-200 transition"><i className="fas fa-history"></i> 紀錄</button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    <div className="mt-8 pt-4 border-t border-slate-200 bg-red-50 p-4 rounded-lg flex items-center gap-4">
                                        <div className="text-red-600 text-sm font-bold"><i className="fas fa-exclamation-triangle"></i> 資料重置區:</div>
                                        <select value={resetTargetClass} onChange={e=>setResetTargetClass(e.target.value)} className="border p-2 rounded text-sm">
                                            <option value="all">全校 (所有班級)</option>
                                            {CLASSES.map(c=><option key={c} value={c}>{c}班</option>)}
                                        </select>
                                        <button onClick={()=>setShowResetConfirm(true)} className="bg-red-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-red-700 transition shadow">執行重置</button>
                                    </div>
                                </div>
                            )}

                            {tab === 'rank' && <LeaderboardView db={db} isTeacherMode={true} />}

                            {tab === 'questions' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                                    <div className="lg:col-span-1 border-r pr-4 flex flex-col">
                                        <h3 className="font-bold mb-4 text-slate-700 flex items-center gap-2"><i className="fas fa-upload"></i> 上傳題目</h3>
                                        <div className="bg-blue-50 p-3 text-xs mb-2 text-blue-800 rounded border border-blue-200 leading-relaxed">
                                            <strong>格式 (Excel複製)：</strong><br />
                                            題目 [Tab] 答案 [Tab] 金幣 [Tab] 生命 [Tab] 攻擊 [Tab] 防禦
                                        </div>
                                        <textarea value={qInput} onChange={e=>setQInput(e.target.value)} className="w-full h-40 border rounded p-2 mb-2 font-mono text-sm resize-none focus:ring-2 focus:ring-blue-500 outline-none" placeholder="在此貼上..."></textarea>
                                        <button onClick={uploadQuestions} className="w-full bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700 shadow mb-2">確認上傳</button>
                                        <div className="mt-auto pt-4 border-t">
                                            <button onClick={()=>confirm("確定清空？") && window.firebaseModules.getDocs(window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions')).then(s=>{const b=window.firebaseModules.writeBatch(db);s.docs.forEach(d=>b.delete(d.ref));b.commit();setMsg("已清空")})} className="w-full border border-red-200 text-red-500 px-4 py-2 rounded text-sm hover:bg-red-50">⚠️ 清空所有題目</button>
                                        </div>
                                    </div>
                                    <div className="lg:col-span-2 flex flex-col h-full overflow-hidden">
                                        <h3 className="font-bold mb-4 text-slate-700 flex justify-between items-center">
                                            <span><i className="fas fa-list"></i> 已上傳列表</span>
                                            <span className="text-xs bg-slate-200 px-2 py-1 rounded text-slate-600">{questions.length} 題</span>
                                        </h3>
                                        <div className="overflow-y-auto custom-scrollbar border rounded-lg bg-white shadow-inner">
                                            <table className="w-full text-xs text-left">
                                                <thead className="bg-slate-50 sticky top-0 text-slate-500">
                                                    <tr>
                                                        <th className="p-3 border-b">題目</th>
                                                        <th className="p-3 border-b w-24">答案</th>
                                                        <th className="p-3 border-b w-32">獎勵 (G/H/A/D)</th>
                                                        <th className="p-3 border-b w-20 text-center">操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {questions.map(q => (
                                                        <tr key={q.id} className="hover:bg-blue-50">
                                                            <td className="p-3 font-medium text-slate-700">{q.question}</td>
                                                            <td className="p-3 text-green-600 font-bold">{q.answer}</td>
                                                            <td className="p-3 text-slate-500">{q.gold}/{q.hp}/{q.atk}/{q.def}</td>
                                                            <td className="p-3 text-center">
                                                                <button onClick={()=>{setEditItem(q); setEditType('question');}} className="text-blue-500 hover:text-blue-700 mx-1"><i className="fas fa-edit"></i></button>
                                                                <button onClick={()=>deleteItem('questions', q.id)} className="text-red-400 hover:text-red-600 mx-1"><i className="fas fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                             {tab === 'coupons' && (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 h-full">
                                    <div className="lg:col-span-1 border-r pr-4 flex flex-col">
                                        <h3 className="font-bold mb-4 text-slate-700 flex items-center gap-2"><i className="fas fa-upload"></i> 上傳商品</h3>
                                         <div className="bg-green-50 p-3 text-xs mb-2 text-green-800 rounded border border-green-200 leading-relaxed">
                                            <strong>格式 (Excel複製)：</strong><br />
                                            名稱 [Tab] 描述 [Tab] 價格 [Tab] +生命 [Tab] +攻擊 [Tab] +防禦
                                        </div>
                                        <textarea value={cInput} onChange={e=>setCInput(e.target.value)} className="w-full h-40 border rounded p-2 mb-2 font-mono text-sm resize-none focus:ring-2 focus:ring-green-500 outline-none" placeholder="在此貼上..."></textarea>
                                        <button onClick={uploadCoupons} className="w-full bg-green-600 text-white px-4 py-2 rounded font-bold hover:bg-green-700 shadow">確認上架</button>
                                    </div>
                                    <div className="lg:col-span-2 flex flex-col h-full overflow-hidden">
                                        <h3 className="font-bold mb-4 text-slate-700 flex justify-between items-center">
                                            <span><i className="fas fa-tags"></i> 貨架清單</span>
                                            <span className="text-xs bg-slate-200 px-2 py-1 rounded text-slate-600">{coupons.length} 項</span>
                                        </h3>
                                        <div className="overflow-y-auto custom-scrollbar border rounded-lg bg-white shadow-inner">
                                            <table className="w-full text-xs text-left">
                                                <thead className="bg-slate-50 sticky top-0 text-slate-500">
                                                    <tr>
                                                        <th className="p-3 border-b">名稱</th>
                                                        <th className="p-3 border-b">描述</th>
                                                        <th className="p-3 border-b w-20">價格</th>
                                                        <th className="p-3 border-b w-24">效果</th>
                                                        <th className="p-3 border-b w-20 text-center">操作</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {coupons.map(c => (
                                                        <tr key={c.id} className="hover:bg-green-50">
                                                            <td className="p-3 font-bold text-slate-700">{c.name}</td>
                                                            <td className="p-3 text-slate-500 truncate max-w-[150px]">{c.desc}</td>
                                                            <td className="p-3 text-yellow-600 font-bold">${c.cost}</td>
                                                            <td className="p-3 text-slate-500">+{c.hp}/+{c.atk}/+{c.def}</td>
                                                            <td className="p-3 text-center">
                                                                <button onClick={()=>{setEditItem(c); setEditType('coupon');}} className="text-blue-500 hover:text-blue-700 mx-1"><i className="fas fa-edit"></i></button>
                                                                <button onClick={()=>deleteItem('coupons', c.id)} className="text-red-400 hover:text-red-600 mx-1"><i className="fas fa-trash"></i></button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {msg && <div className="fixed bottom-4 right-4 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl animate-bounce-short font-bold flex items-center gap-2"><i className="fas fa-info-circle"></i> {msg}</div>}

                    {/* Modals */}
                    {editStudent && <EditStatsModal student={editStudent} onClose={()=>setEditStudent(null)} onSave={handleSaveStats} />}
                    {historyStudent && <QuizHistoryModal student={historyStudent} db={db} classId={classId} onClose={()=>setHistoryStudent(null)} />}

                    {/* Reset Confirm Modal */}
                    {showResetConfirm && (
                        <Modal title="⚠️ 危險操作：重置資料" onClose={()=>setShowResetConfirm(false)}>
                            <div className="space-y-4 text-center">
                                <div className="text-red-600 font-bold text-lg bg-red-50 p-4 rounded-lg border border-red-200">
                                    您即將刪除 <span className="underline">{resetTargetClass === 'all' ? '全校' : `${resetTargetClass}班`}</span> 所有學生資料。
                                    <br />此操作無法復原！
                                </div>
                                <p className="text-slate-600 text-sm">請輸入 <strong>RESET</strong> 以確認執行：</p>
                                <input
                                    value={resetConfirmCode}
                                    onChange={e=>setResetConfirmCode(e.target.value)}
                                    className="w-full p-3 border-2 border-red-300 rounded text-center font-bold tracking-widest uppercase focus:border-red-600 outline-none"
                                    placeholder="輸入 RESET"
                                />
                                <div className="flex gap-2 justify-center mt-4">
                                    <button onClick={()=>setShowResetConfirm(false)} className="px-4 py-2 bg-slate-200 rounded font-bold text-slate-600">取消</button>
                                    <button onClick={executeReset} disabled={resetConfirmCode !== 'RESET'} className="px-6 py-2 bg-red-600 text-white rounded font-bold hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">確認刪除</button>
                                </div>
                            </div>
                        </Modal>
                    )}

                    {/* Generic Item Edit Modal */}
                    {editItem && (
                        <Modal title={editType === 'question' ? '編輯題目' : '編輯商品'} onClose={()=>{setEditItem(null); setEditType(null);}}>
                            <div className="space-y-3 text-sm">
                                {editType === 'question' ? (
                                    <>
                                        <div><label className="font-bold text-slate-600">題目</label><textarea value={editItem.question} onChange={e=>setEditItem({...editItem, question: e.target.value})} className="border p-2 w-full h-20 rounded"></textarea></div>
                                        <div><label className="font-bold text-slate-600">答案</label><input value={editItem.answer} onChange={e=>setEditItem({...editItem, answer: e.target.value})} className="border p-2 w-full rounded" /></div>
                                        <div className="grid grid-cols-4 gap-2">
                                            <div><label className="text-xs font-bold">金幣</label><input type="number" value={editItem.gold} onChange={e=>setEditItem({...editItem, gold: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                            <div><label className="text-xs font-bold">HP</label><input type="number" value={editItem.hp} onChange={e=>setEditItem({...editItem, hp: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                            <div><label className="text-xs font-bold">ATK</label><input type="number" value={editItem.atk} onChange={e=>setEditItem({...editItem, atk: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                            <div><label className="text-xs font-bold">DEF</label><input type="number" value={editItem.def} onChange={e=>setEditItem({...editItem, def: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                        </div>
                                    </>
                                ) : (
                                    <>
                                        <div><label className="font-bold text-slate-600">名稱</label><input value={editItem.name} onChange={e=>setEditItem({...editItem, name: e.target.value})} className="border p-2 w-full rounded" /></div>
                                        <div><label className="font-bold text-slate-600">描述</label><textarea value={editItem.desc} onChange={e=>setEditItem({...editItem, desc: e.target.value})} className="border p-2 w-full rounded"></textarea></div>
                                        <div><label className="font-bold text-slate-600">價格</label><input type="number" value={editItem.cost} onChange={e=>setEditItem({...editItem, cost: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div><label className="text-xs font-bold">+HP</label><input type="number" value={editItem.hp} onChange={e=>setEditItem({...editItem, hp: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                            <div><label className="text-xs font-bold">+ATK</label><input type="number" value={editItem.atk} onChange={e=>setEditItem({...editItem, atk: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                            <div><label className="text-xs font-bold">+DEF</label><input type="number" value={editItem.def} onChange={e=>setEditItem({...editItem, def: parseInt(e.target.value)})} className="border p-2 w-full rounded" /></div>
                                        </div>
                                    </>
                                )}
                                <button onClick={()=>saveItemEdit(editType === 'question' ? 'questions' : 'coupons', editItem.id, editItem)} className="w-full bg-blue-600 text-white py-2 mt-4 rounded-lg font-bold shadow hover:bg-blue-700">儲存變更</button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const App = () => {
            const { db, ready, error } = useFirebase();
            const [classId, setClassId] = useState(null);
            const [user, setUser] = useState(null);
            const [view, setView] = useState('loading');

            useEffect(() => {
                if(!ready || !db) return;
                const savedClass = localStorage.getItem('RPG_CLASS');
                const savedUid = localStorage.getItem('RPG_UID');
                const tryAutoLogin = async () => {
                    if (savedClass) {
                        setClassId(savedClass);
                        if (savedUid === 'TEACHER') {
                            setUser({role: 'teacher'});
                            setView('teacher_dash');
                        } else if (savedUid) {
                            const docRef = window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', savedClass, 'users', savedUid);
                            const docSnap = await window.firebaseModules.getDoc(docRef);
                            if(docSnap.exists()) {
                                setUser({id: savedUid, ...docSnap.data()});
                                setView('student_dash');
                            } else {
                                localStorage.removeItem('RPG_UID');
                                setView('login');
                            }
                        } else { setView('login'); }
                    } else { setView('class_select'); }
                };
                tryAutoLogin();
            }, [ready, db]);

            const handleClassSelect = (c) => { setClassId(c); localStorage.setItem('RPG_CLASS', c); setView('login'); };
            const handleStudentLogin = async (seat, pwd) => {
                if(!seat || !pwd) return alert("請輸入完整資訊");
                const uid = `${classId}-${seat}`;
                const docRef = window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', uid);
                const docSnap = await window.firebaseModules.getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.password === pwd) {
                        setUser({id: uid, ...data}); localStorage.setItem('RPG_UID', uid); setView('student_dash');
                    } else { alert("密碼錯誤"); }
                } else { setUser({id: uid, seat: seat}); setView('register'); }
            };
            const handleRegister = async ({name, nickname, gender, avatar, password}) => {
                const uid = user.id;
                const newUser = { name, nickname, gender, avatar, password, seat: user.seat, ...INITIAL_STATS, lastLoginDate: formatDate(new Date()) };
                await window.firebaseModules.setDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', uid), newUser);
                setUser({id: uid, ...newUser}); localStorage.setItem('RPG_UID', uid); setView('student_dash');
            };
            const handleTeacherLogin = (pwd) => {
                if (pwd === DEFAULT_TEACHER_PWD) { setUser({role: 'teacher'}); localStorage.setItem('RPG_UID', 'TEACHER'); setView('teacher_dash'); } else { alert("老師密碼錯誤"); }
            };
            const handleLogout = () => { localStorage.removeItem('RPG_UID'); setUser(null); setView('login'); };

            if (!ready) return <Loading msg="正在連接元素世界..." />;
            if (error) return <ErrorScreen msg={error} />;

            return (
                <div className="min-h-screen font-sans text-slate-900 pb-10">
                    {view === 'loading' && <Loading />}
                    {view === 'class_select' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 text-white">
                            <h1 className="text-5xl md:text-7xl font-black mb-2 tracking-widest gold-text font-serif" style={{fontFamily: 'Cinzel, serif'}}>煉金學園</h1>
                            <h2 className="text-xl md:text-2xl font-bold mb-12 tracking-[0.5em] silver-text uppercase">Alchemy Academy · 元素之戰</h2>

                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl px-4">
                                {CLASSES.map(c => (
                                    <button key={c} onClick={() => handleClassSelect(c)} className="glass-panel p-6 md:p-8 text-2xl font-black text-slate-800 hover:bg-white hover:scale-105 hover:shadow-[0_0_25px_rgba(250,204,21,0.6)] transition duration-300 border-2 border-transparent hover:border-yellow-400 group relative overflow-hidden">
                                        <span className="relative z-10">{c} <span className="text-sm font-normal text-slate-500">班</span></span>
                                        <div className="absolute inset-0 bg-gradient-to-r from-yellow-100/0 via-yellow-100/50 to-yellow-100/0 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                    {view === 'login' && <LoginView classId={classId} onLogin={handleStudentLogin} onTeacherLogin={handleTeacherLogin} onBack={()=>setView('class_select')} />}
                    {view === 'register' && <RegisterModal seat={user.seat} onRegister={handleRegister} onCancel={()=>setView('login')} />}
                    {view === 'student_dash' && user && <StudentDashboard user={user} db={db} classId={classId} onLogout={handleLogout} />}
                    {view === 'teacher_dash' && <TeacherDashboard db={db} classId={classId} onLogout={handleLogout} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
