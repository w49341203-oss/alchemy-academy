                        if (savedUid === 'TEACHER') {
                            setUser({ role: 'teacher' });
                            setView('teacher_dash');
                        } else if (savedUid) {
                            const docRef = window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', savedClass, 'users', savedUid);
                            const docSnap = await window.firebaseModules.getDoc(docRef);
                            if (docSnap.exists()) {
                                setUser({ id: savedUid, ...docSnap.data() });
                                setView('student_dash');
                            } else {
                                safeStorage.remove('RPG_UID');
                                setView('login');
                            }
                        } else { setView('login'); }
                    } else { setView('class_select'); }
                })();
            }, [ready, db]);

            const handleClassSelect = (c) => { setClassId(c); safeStorage.set('RPG_CLASS', c); setView('login'); };
            const handleStudentLogin = async (seat, pwd) => {
                if (!seat || !pwd) return alert("請輸入完整資訊");
                // 座號正規化：「05」和「5」視為同一號，避免產生分身帳號
                const seatNum = parseInt(seat, 10);
                if (isNaN(seatNum) || seatNum < 1 || seatNum > 99) return alert("請輸入有效座號（1~99）");
                const seatStr = String(seatNum);
                const uid = `${classId}-${seatStr}`;
                const docRef = window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', uid);
                const docSnap = await window.firebaseModules.getDoc(docRef);
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (data.password === pwd) {
                        setUser({ id: uid, ...data });
                        safeStorage.set('RPG_UID', uid);
                        setView('student_dash');
                    } else { alert("密碼錯誤"); }
                } else {
                    setUser({ id: uid, seat: seatStr });
                    setView('register');
                }
            };
            const handleRegister = async ({ name, nickname, gender, avatar, password }) => {
                const uid = user.id;
                const newUser = { name, nickname, gender, avatar, password, seat: user.seat, ...INITIAL_STATS, lastLoginDate: formatDate(new Date()) };
                await window.firebaseModules.setDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', uid), newUser);
                setUser({ id: uid, ...newUser });
                safeStorage.set('RPG_UID', uid);
                setView('student_dash');
            };
            const handleTeacherLogin = async (pwd) => {
                try {
                    const h = await sha256Hex(TEACHER_PWD_SALT + (pwd || ""));
                    if (h === TEACHER_PWD_HASH) {
                        setUser({ role: 'teacher' });
                        safeStorage.set('RPG_UID', 'TEACHER');
                        setView('teacher_dash');
                    } else alert("老師密碼錯誤");
                } catch (e) {
                    alert("此環境不支援密碼驗證（需要 https 或本機環境）");
                }
            };
            const handleLogout = () => { safeStorage.remove('RPG_UID'); setUser(null); setView('login'); };

            if (!ready) return <Loading msg="正在連接元素世界..." />;
            if (error) return <ErrorScreen msg={error} />;

            return (
                <div className="min-h-screen font-sans text-slate-900 pb-10">
                    {view === 'loading' && <Loading />}
                    {view === 'class_select' && (
                        <div className="flex flex-col items-center justify-center min-h-screen p-4 text-white">
                            <h1 className="text-5xl md:text-7xl font-black mb-2 tracking-widest gold-text" style={{ fontFamily: 'Cinzel, serif' }}>煉金學園</h1>
                            <h2 className="text-xl md:text-2xl font-bold mb-2 tracking-[0.5em] silver-text uppercase">Alchemy Academy · 元素之戰</h2>
                            <div className="text-xs text-white/40 mb-10">{APP_VERSION}</div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6 w-full max-w-4xl px-4">
                                {CLASSES.map(c => (
                                    <button key={c} onClick={() => handleClassSelect(c)} className="glass-panel p-6 md:p-8 text-2xl font-black text-slate-800 hover:bg-white hover:scale-105 transition border-2 border-transparent hover:border-yellow-400">
                                        <span className="relative z-10">{c} <span className="text-sm font-normal text-slate-500">班</span></span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                    {view === 'login' && <LoginView classId={classId} onLogin={handleStudentLogin} onTeacherLogin={handleTeacherLogin} onBack={() => setView('class_select')} />}
                    {view === 'register' && <RegisterModal seat={user.seat} onRegister={handleRegister} onCancel={() => setView('login')} />}
                    {view === 'student_dash' && user && <StudentDashboard user={user} db={db} classId={classId} onLogout={handleLogout} />}
                    {view === 'teacher_dash' && <TeacherDashboard db={db} classId={classId} onLogout={handleLogout} />}
                </div>
            );
        };

        class ErrorBoundary extends React.Component {
            constructor(p) { super(p); this.state = { err: null }; }
            static getDerivedStateFromError(err) { return { err }; }
            componentDidCatch(err, info) { console.error("ErrorBoundary caught:", err, info); }
            render() {
                if (this.state.err) {
                    return (
                        <div className="min-h-screen flex items-center justify-center p-4 text-white">
                            <div className="glass-panel p-8 max-w-lg text-slate-800 text-center">
                                <h2 className="text-2xl font-bold mb-4 text-red-600">畫面渲染失敗</h2>
                                <p className="mb-4 text-sm">錯誤訊息：<code className="bg-red-50 px-2 py-1 rounded">{this.state.err.message}</code></p>
                                <p className="text-xs text-slate-500 mb-4">可能原因：題庫資料缺漏、或舊版 PK 資料殘留。可嘗試登出後重新登入。</p>
                                <button onClick={() => { try { localStorage.clear(); } catch { } location.reload(); }} className="bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-700">清除登入並重新整理</button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
