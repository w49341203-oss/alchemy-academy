            if (idx >= 0) {
                inv[idx] = { ...inv[idx], count: (inv[idx].count || 0) + count };
            } else {
                inv.push({ itemId, count });
            }
            return inv;

            const inv = Array.isArray(inventory) ? [...inventory] : [];
            const idx = inv.findIndex(i => i && i.itemId === itemId);
            if (idx < 0) return inv;
            const newCount = (inv[idx].count || 0) - count;

            if (!window.html2canvas || !window.jspdf) {
                alert("PDF 函式庫尚未載入完成，請稍候再試");
                return;
            }
            const canvas = await window.html2canvas(element, { scale: 2, backgroundColor: '#ffffff', useCORS: true, logging: false });
            const imgData = canvas.toDataURL('image/png');
            const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');
            const pdfWidth = pdf.internal.pageSize.getWidth();
            const pdfHeight = pdf.internal.pageSize.getHeight();
            const imgWidth = pdfWidth;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            if (imgHeight <= pdfHeight) {
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
            } else {
                let heightLeft = imgHeight, position = 0;
                while (heightLeft > 0) {
                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pdfHeight;
                    position -= pdfHeight;
                    if (heightLeft > 0) pdf.addPage();
                }
            }
            pdf.save(filename);
        };

        // 隱藏的 PDF 渲染區域

        // ============================================================
        // Leaderboard
        // ============================================================
        const LeaderboardView = ({ db, currentUser, isTeacherMode }) => {
            const [users, setUsers] = useState([]);
            const [category, setCategory] = useState("total");

            useEffect(() => {
                if (!db) return;
                const fetchAll = async () => {
                    let all = [];
                    for (let c of CLASSES) {
                        const q = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', c, 'users');
                        const snap = await window.firebaseModules.getDocs(q);
                        snap.forEach(d => {
                            const u = d.data();
                            const eff = getEffectiveStats(u);
                            const score = (u.xp || 0) + (eff.maxHp + eff.atk + eff.def) + ((u.hearts || 0) * 10) + Math.floor((u.gold || 0) * 0.1);
                            // 進步分數：最近 20 題答對率 - 更早的答對率（兩邊都要 ≥9 題才計算）
                            const recent = Array.isArray(u.recentResults) ? u.recentResults : [];
                            const recentC = recent.reduce((a, b) => a + (b ? 1 : 0), 0);
                            const earlierQ = (u.totalQuizQuestions || 0) - recent.length;
                            const earlierC = (u.totalQuizCorrect || 0) - recentC;
                            const progress = (recent.length >= 9 && earlierQ >= 9 && earlierC >= 0)
                                ? Math.round((recentC / recent.length - earlierC / earlierQ) * 100)
                                : null;
                            all.push({ ...u, class: c, id: d.id, score, effAtk: eff.atk, effDef: eff.def, effMaxHp: eff.maxHp, progress });
                        });
                    }
                    setUsers(all);
                };
                fetchAll();
            }, [db]);

            const getSorted = () => {
                let sorted = [...users];
                switch (category) {
                    case 'total':   sorted.sort((a, b) => b.score - a.score); break;
                    case 'xp':      sorted.sort((a, b) => (b.xp || 0) - (a.xp || 0)); break;
                    case 'gold':    sorted.sort((a, b) => (b.gold || 0) - (a.gold || 0)); break;
                    case 'hearts':  sorted.sort((a, b) => (b.hearts || 0) - (a.hearts || 0)); break;
                    case 'hp':      sorted.sort((a, b) => b.effMaxHp - a.effMaxHp); break;
                    case 'atk':     sorted.sort((a, b) => b.effAtk - a.effAtk); break;
                    case 'def':     sorted.sort((a, b) => b.effDef - a.effDef); break;
                    case 'progress':
                        sorted = sorted.filter(u => u.progress !== null && u.progress !== undefined);
                        sorted.sort((a, b) => b.progress - a.progress);
                        break;
                }
                return sorted;
            };

            const sortedList = getSorted();
            const myRank = currentUser ? sortedList.findIndex(u => u.id === currentUser.id) + 1 : 0;
            const displayList = isTeacherMode ? sortedList : sortedList.slice(0, 10);

            const cats = [
                { id: 'total', name: '元素大師', icon: 'fa-trophy', color: 'text-yellow-500', desc: '綜合總分：經驗值＋戰力（HP+ATK+DEF）＋愛心×10＋金幣×0.1' },
                { id: 'progress', name: '進步之星', icon: 'fa-arrow-trend-up', color: 'text-emerald-500', desc: '最近 20 題比更早的自己進步幾個百分點——只跟自己比！（約累積一週題量後上榜）' },
                { id: 'xp', name: '博學多聞', icon: 'fa-book', color: 'text-blue-500', desc: '每日答題累積的經驗值（XP），答得越勤分數越高' },
                { id: 'gold', name: '煉金大亨', icon: 'fa-coins', color: 'text-yellow-600', desc: '目前持有的金幣數（花掉就不算囉）' },
                { id: 'hearts', name: '校園人氣', icon: 'fa-heart', color: 'text-pink-500', desc: '收到同學送的愛心總數' },
                { id: 'hp', name: '堅韌肉盾', icon: 'fa-shield-heart', color: 'text-red-500', desc: '最大生命值（含裝備加成）' },
                { id: 'atk', name: '破壞神', icon: 'fa-khanda', color: 'text-orange-500', desc: '攻擊力（含裝備加成）' },
                { id: 'def', name: '守護者', icon: 'fa-shield-alt', color: 'text-indigo-500', desc: '防禦力（含裝備加成）' }
            ];

            const getDisplayValue = (u) => {
                switch (category) {
                    case 'total': return Math.floor(u.score);
                    case 'progress': return (u.progress > 0 ? "+" : "") + u.progress + "%";
                    case 'xp': return u.xp || 0;
                    case 'gold': return u.gold || 0;
                    case 'hearts': return u.hearts || 0;
                    case 'hp': return u.effMaxHp;
                    case 'atk': return u.effAtk;
                    case 'def': return u.effDef;

                return 0;
            };

            return (
                <div className="space-y-4">
                    <div className="flex gap-2 overflow-x-auto pb-2">
                        {cats.map(c => (
                            <button key={c.id} onClick={() => setCategory(c.id)} className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all ${category === c.id ? 'bg-blue-600 text-white shadow-lg scale-105 ring-2 ring-blue-300' : 'bg-white text-slate-500 hover:bg-blue-50'}`}>
                                <i className={`fas ${c.icon} ${category === c.id ? 'text-white' : c.color}`}></i> {c.name}
                            </button>
                        ))}
                    </div>
                    <div className="glass-panel p-4 min-h-[300px]">
                        <h3 className="font-bold text-center text-lg mb-1 text-slate-700 flex items-center justify-center gap-2">
                            <i className={`fas ${cats.find(c => c.id === category).icon} text-xl`}></i>
                            {cats.find(c => c.id === category).name}榜
                            <span className="text-xs bg-slate-200 px-2 py-0.5 rounded text-slate-500">{isTeacherMode ? "完整榜單" : "Top 10"}</span>
                        </h3>
                        <p className="text-xs text-slate-400 text-center mb-4">{cats.find(c => c.id === category).desc}</p>
                        <div className="space-y-2 max-h-[60vh] overflow-y-auto">
                            {displayList.map((u, idx) => (
                                <div key={u.id} className={`flex items-center p-2 rounded-lg transition ${currentUser && u.id === currentUser.id ? 'bg-yellow-50 border border-yellow-300 shadow-sm' : 'bg-white/50 border border-transparent'}`}>
                                    <div className={`w-8 text-center font-black italic ${idx === 0 ? 'rank-badge-1' : idx === 1 ? 'rank-badge-2' : idx === 2 ? 'rank-badge-3' : 'text-slate-400'}`}>#{idx + 1}</div>
                                    <img src={u.avatar} className="w-8 h-8 rounded-full bg-white border border-slate-200 mx-2" />
                                    <div className="flex-1 text-sm">
                                        <div className="font-bold text-slate-800 truncate">
                                            {isTeacherMode ? `${u.class}班 ${u.name}` : (u.nickname || "神秘人")}

                                        {isTeacherMode && <div className="text-xs text-slate-400">{u.nickname}</div>}
                                    </div>
                                    <div className="font-mono font-bold text-blue-600">{getDisplayValue(u)}</div>
                                </div>
                            ))}
                        </div>
                        {currentUser && !isTeacherMode && (
                            <div className="mt-4 pt-4 border-t border-slate-200 text-center text-sm font-bold text-slate-600">
                                你的排名: <span className="text-blue-600 text-lg">#{myRank > 0 ? myRank : "榜外"}</span>
                            </div>

            const [name, setName] = useState("");
            const [nickname, setNickname] = useState("");
            const [gender, setGender] = useState("boy");
            const [avatar, setAvatar] = useState(AVATARS[0]);
            const [customAvatar, setCustomAvatar] = useState("");
            const [pwd, setPwd] = useState("");
            const finalAvatar = customAvatar || avatar;
            return (
                <Modal title="初次見面！建立檔案" onClose={onCancel}>
                    <div className="space-y-4">
                        <div className="bg-yellow-50 p-3 rounded text-sm text-yellow-800"><i className="fas fa-exclamation-triangle"></i> 姓名與座號註冊後無法自行修改，請填寫正確！</div>
                        <div className="grid grid-cols-2 gap-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1">座號</label>
                                <div className="text-lg font-bold bg-gray-100 p-2 rounded text-center">{seat}</div>
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-500 mb-1">性別</label>
                                <div className="flex gap-2 bg-gray-100 p-2 rounded justify-center">
                                    <label className="cursor-pointer"><input type="radio" name="gender" value="boy" checked={gender === 'boy'} onChange={() => setGender('boy')} /> 男</label>
                                    <label className="cursor-pointer"><input type="radio" name="gender" value="girl" checked={gender === 'girl'} onChange={() => setGender('girl')} /> 女</label>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1">真實姓名 (老師看)</label>
                            <input value={name} onChange={e => setName(e.target.value)} className="w-full p-2 border rounded" placeholder="請輸入姓名" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1">暱稱 (同學看)</label>
                            <input value={nickname} onChange={e => setNickname(e.target.value)} className="w-full p-2 border rounded" placeholder="取個帥氣的名字" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-1">設定登入密碼</label>
                            <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} className="w-full p-2 border rounded" placeholder="未來登入用" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 mb-2">選擇頭像</label>
                            <div className="flex gap-2 mb-2 flex-wrap justify-center bg-gray-50 p-2 rounded">
                                {AVATARS.map(a => (
                                    <img key={a} src={a} onClick={() => setAvatar(a)} className={`w-12 h-12 rounded-full avatar-option ${avatar === a && !customAvatar ? 'selected' : ''}`} />
                                ))}
                            </div>
                            <input value={customAvatar} onChange={e => setCustomAvatar(e.target.value)} className="w-full p-2 border rounded text-xs" placeholder="或貼上圖片網址..." />
                        </div>
                        <button disabled={!name || !pwd || !nickname} onClick={() => onRegister({ name, nickname, gender, avatar: finalAvatar, password: pwd })} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold disabled:opacity-50 hover:bg-blue-700 transition">開始冒險</button>
                    </div>
                </Modal>
            );
        };

        // ============================================================
        // Shop / Inventory / Item card
        // ============================================================
        const ItemCard = ({ item, action, badge, hint }) => {
            const eff = item.effects || {};
            return (
                <div className="rpg-card p-3 flex flex-col">
                    <div className="flex items-start gap-2 mb-2">
                        <div className="text-3xl shrink-0">{item.emoji}</div>
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-1 flex-wrap">
                                <span className="font-bold text-sm text-slate-800 truncate">{item.name}</span>
                                <span className={`tier-badge tier-${item.tier}`}>T{item.tier}</span>
                                {badge}
                            </div>
                            <div className="text-xs text-slate-500 mt-1 leading-tight">{item.desc}</div>
                        </div>
                    </div>
                    <div className="text-xs font-mono mt-1 flex gap-2 flex-wrap">
                        {eff.atk ? <span className="text-orange-600">ATK+{eff.atk}</span> : null}
                        {eff.def ? <span className="text-indigo-600">DEF+{eff.def}</span> : null}
                        {eff.hp ? <span className="text-red-500">HP+{eff.hp}</span> : null}
                    </div>
                    {hint && <div className="text-xs text-slate-400 mt-1">{hint}</div>}
                    {action}
                </div>
            );
        };

        const ShopView = ({ user, db, classId, setMsg }) => {
            const [tab, setTab] = useState("weapon");
            const [globalLimits, setGlobalLimits] = useState({});

            useEffect(() => {
                if (!db) return;
                const ref = window.firebaseModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'globalLimits', 'main');
                const unsub = window.firebaseModules.onSnapshot(ref, snap => {
                    setGlobalLimits(snap.exists() ? snap.data() : {});
                });
                return () => unsub();
            }, [db]);

            const itemsForTab = Object.values(SHOP_ITEMS)
                .filter(i => i.type === tab)
                .sort((a, b) => a.cost - b.cost);

            const buy = async (item) => {
                const { doc, runTransaction, setDoc } = window.firebaseModules;
                const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id);
                const limitRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'globalLimits', 'main');
                try {
                    await runTransaction(db, async (t) => {
                        const uDoc = await t.get(userRef);
                        const uData = uDoc.data();
                        if ((uData.gold || 0) < item.cost) throw "金幣不足";

                        if (item.type === "upgradeStone") {
                            const lDoc = await t.get(limitRef);
                            const limits = lDoc.exists() ? lDoc.data() : {};
                            const sold = limits[item.id] || 0;
                            if (sold >= item.globalLimit) throw "已售完";
                            // 永久升級石：直接套用，不入背包
                            const newBaseAtk = (uData.baseAtk ?? uData.atk ?? 10) + (item.effects.atk || 0);
                            const newBaseDef = (uData.baseDef ?? uData.def ?? 10) + (item.effects.def || 0);
                            const newBaseMaxHp = (uData.baseMaxHp ?? uData.maxHp ?? 100) + (item.effects.hp || 0);
                            t.update(userRef, {
                                gold: (uData.gold || 0) - item.cost,
                                totalGoldSpent: (uData.totalGoldSpent || 0) + item.cost,
                                baseAtk: newBaseAtk,
                                baseDef: newBaseDef,
                                baseMaxHp: newBaseMaxHp,
                                hp: Math.min((uData.hp || 0) + (item.effects.hp || 0), newBaseMaxHp)
                            });
                            t.set(limitRef, { ...limits, [item.id]: sold + 1 }, { merge: true });
                        } else {
                            // 一般商品：入背包
                            const newInv = invAdd(uData.inventory, item.id, 1);
                            t.update(userRef, {
                                gold: (uData.gold || 0) - item.cost,
                                totalGoldSpent: (uData.totalGoldSpent || 0) + item.cost,
                                inventory: newInv
                            });
                        }
                    });
                    setMsg({ title: "購買成功", content: `已購買 ${item.name}！${item.type === "upgradeStone" ? "效果已即時套用。" : "請至物品欄查看。"}` });
                } catch (e) {
                    console.error(e);
                    setMsg({ title: "購買失敗", content: typeof e === "string" ? e : "發生錯誤" });
                }
            };

            return (
                <div className="space-y-3">
                    <div className="flex gap-2 overflow-x-auto pb-2">
                        {SHOP_TABS.map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`flex items-center gap-1 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap transition-all ${tab === t.id ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-white text-slate-500 hover:bg-blue-50'}`}>
                                <span>{t.emoji}</span>{t.label}
                            </button>
                        ))}
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                        {itemsForTab.map(item => {
                            const sold = globalLimits[item.id] || 0;
                            const limit = item.globalLimit || 0;
                            const isLimited = item.type === "upgradeStone";
                            const soldOut = isLimited && sold >= limit;
                            const canAfford = (user.gold || 0) >= item.cost;
                            return (
                                <ItemCard
                                    key={item.id}
                                    item={item}
                                    badge={isLimited ? <span className="text-xs bg-purple-100 text-purple-700 px-1.5 py-0.5 rounded font-bold">全校 {sold}/{limit}</span> : null}
                                    action={
                                        <div className="flex justify-between items-center mt-2 pt-2 border-t border-slate-100">
                                            <span className="text-yellow-600 font-black"><i className="fas fa-coins"></i> {item.cost}</span>
                                            <button
                                                disabled={!canAfford || soldOut}
                                                onClick={() => buy(item)}
                                                className="bg-green-500 text-white px-3 py-1 rounded text-sm hover:bg-green-600 font-bold shadow disabled:opacity-40 disabled:cursor-not-allowed">
                                                {soldOut ? "已售完" : !canAfford ? "金幣不足" : "購買"}
                                            </button>
                                        </div>
                                    }
                                />
                            );
                        })}
                    </div>
                </div>
            );
        };

        const InventoryView = ({ user, db, classId, setMsg }) => {
            const [tab, setTab] = useState("equipment");
            const eff = getEffectiveStats(user);

            const updateUser = async (updates) => {
                const { doc, updateDoc } = window.firebaseModules;
                await updateDoc(doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id), updates);
            };

            const equip = async (item) => {
                const slotField = item.slot === "weapon" ? "equippedWeapon" :
                                  item.slot === "armor" ? "equippedArmor" : "equippedAccessory";
                await updateUser({ [slotField]: item.id });
                setMsg({ title: "裝備成功", content: `已裝備 ${item.name}` });
            };
            const unequip = async (slot) => {
                const slotField = slot === "weapon" ? "equippedWeapon" :
                                  slot === "armor" ? "equippedArmor" : "equippedAccessory";
                await updateUser({ [slotField]: null });
            };
            const sell = async (item) => {
                if (!confirm(`確定要賣出「${item.name}」？將以原價 50% (${Math.floor(item.cost / 2)} 金幣) 售出。`)) return;
                const { doc, runTransaction } = window.firebaseModules;
                const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id);
                await runTransaction(db, async (t) => {
                    const uDoc = await t.get(userRef);
                    const uData = uDoc.data();
                    const newInv = invRemove(uData.inventory, item.id, 1);
                    const refund = Math.floor(item.cost / 2);
                    t.update(userRef, {
                        gold: (uData.gold || 0) + refund,
                        inventory: newInv
                    });
                });
                setMsg({ title: "賣出成功", content: `${item.name} 已賣出，獲得 ${Math.floor(item.cost / 2)} 金幣` });
            };
            const useConsumable = async (item) => {
                const { doc, runTransaction } = window.firebaseModules;
                const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id);
                try {
                    await runTransaction(db, async (t) => {
                        const uDoc = await t.get(userRef);
                        const uData = uDoc.data();
                        const newInv = invRemove(uData.inventory, item.id, 1);
                        let upd = { inventory: newInv };

                        if (item.consumable === "heal") {
                            const effLocal = getEffectiveStats(uData);
                            upd.hp = effLocal.maxHp;
                        } else if (item.consumable === "buff") {
                            const cleaned = cleanExpiredBuffs(uData.buffs).filter(b => b.type !== item.buffType);
                            cleaned.push({ type: item.buffType, expiresAt: Date.now() + item.buffDuration });
                            upd.buffs = cleaned;
                        } else if (item.consumable === "revive") {
                            // 復活符不在使用時消耗，會在 PK 死亡時自動觸發
                            throw "復活符會在 HP 歸零時自動生效，不需要主動使用";
                        } else if (item.consumable === "extraQuiz") {
                            if ((uData.dailyQuizCount || 0) === 0) throw "今日尚未答題，不需要使用";
                            if (uData.extraQuizUsed) throw "今日已用過機會券（每日限 1 張）";
                            upd.dailyQuizCount = Math.max(0, (uData.dailyQuizCount || 0) - 1);
                            upd.extraQuizUsed = true;
                        } else if (item.consumable === "rerollQuiz") {
                            upd.dailyQuizCount = 0;
                            upd.lastQuizQuestions = [];
                        }
                        t.update(userRef, upd);
                    });
                    setMsg({ title: "使用成功", content: `${item.name} 效果已生效！` });
                } catch (e) {
                    setMsg({ title: "無法使用", content: typeof e === "string" ? e : e.message });
                }
            };

            const inventory = Array.isArray(user.inventory) ? user.inventory : [];
            const equipped = {
                weapon: user.equippedWeapon ? SHOP_ITEMS[user.equippedWeapon] : null,
                armor: user.equippedArmor ? SHOP_ITEMS[user.equippedArmor] : null,
                accessory: user.equippedAccessory ? SHOP_ITEMS[user.equippedAccessory] : null
            };

            const enrichedInv = inventory
                .map(inv => ({ ...inv, item: SHOP_ITEMS[inv.itemId] }))
                .filter(x => x.item);

            const equipmentInv = enrichedInv.filter(x => ["weapon", "armor", "accessory"].includes(x.item.type));
            const consumableInv = enrichedInv.filter(x => x.item.type === "consumable");

            return (
                <div className="space-y-3">
                    <div className="flex gap-2">
                        <button onClick={() => setTab("equipment")} className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${tab === "equipment" ? "bg-blue-600 text-white shadow" : "bg-white text-slate-500 hover:bg-blue-50"}`}>⚔️ 裝備</button>
                        <button onClick={() => setTab("consumable")} className={`flex-1 py-2 rounded-lg font-bold text-sm transition ${tab === "consumable" ? "bg-blue-600 text-white shadow" : "bg-white text-slate-500 hover:bg-blue-50"}`}>🧪 消耗品 ({consumableInv.reduce((a, b) => a + (b.count || 0), 0)})</button>
                    </div>

                    {tab === "equipment" && (
                        <div>
                            <div className="glass-panel p-3 mb-3">
                                <h4 className="font-bold text-sm text-slate-700 mb-2">目前裝備</h4>
                                <div className="grid grid-cols-3 gap-2">
                                    {["weapon", "armor", "accessory"].map(slot => {
                                        const item = equipped[slot];
                                        const label = slot === "weapon" ? "武器" : slot === "armor" ? "防具" : "飾品";
                                        return (
                                            <div key={slot} className={`p-2 rounded border-2 text-center ${item ? "bg-blue-50 border-blue-300" : "bg-slate-50 border-dashed border-slate-300"}`}>
                                                <div className="text-2xl">{item ? item.emoji : "—"}</div>
                                                <div className="text-xs font-bold mt-1">{item ? item.name : `(空 ${label})`}</div>
                                                {item && <button onClick={() => unequip(slot)} className="text-xs text-red-500 hover:underline mt-1">卸下</button>}
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="text-xs text-slate-500 mt-2 font-mono">總戰力：HP {eff.maxHp} / ATK {eff.atk} / DEF {eff.def}</div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                {equipmentInv.length === 0 && <div className="col-span-2 text-center text-white/50 py-10">背包裡沒有裝備</div>}
                                {equipmentInv.map(({ item, count }, idx) => {
                                    const isEquipped = (user.equippedWeapon === item.id) || (user.equippedArmor === item.id) || (user.equippedAccessory === item.id);
                                    return (
                                        <ItemCard
                                            key={idx}
                                            item={item}
                                            badge={count > 1 ? <span className="text-xs bg-slate-200 px-1.5 py-0.5 rounded">x{count}</span> : null}
                                            action={
                                                <div className="flex gap-2 mt-2 pt-2 border-t border-slate-100">
                                                    {!isEquipped && <button onClick={() => equip(item)} className="flex-1 bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold hover:bg-blue-700">裝備</button>}
                                                    {isEquipped && <button disabled className="flex-1 bg-slate-300 text-slate-600 px-2 py-1 rounded text-xs font-bold">使用中</button>}
                                                    <button onClick={() => sell(item)} className="bg-amber-500 text-white px-2 py-1 rounded text-xs font-bold hover:bg-amber-600">賣 {Math.floor(item.cost / 2)}</button>
                                                </div>
                                            }
                                        />
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {tab === "consumable" && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                            {consumableInv.length === 0 && <div className="col-span-2 text-center text-white/50 py-10">背包裡沒有消耗品</div>}
                            {consumableInv.map(({ item, count }, idx) => (
                                <ItemCard
                                    key={idx}
                                    item={item}
                                    badge={<span className="text-xs bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded font-bold">x{count}</span>}
                                    action={
                                        <div className="mt-2 pt-2 border-t border-slate-100">
                                            <button onClick={() => useConsumable(item)} className="w-full bg-purple-600 text-white px-2 py-1 rounded text-xs font-bold hover:bg-purple-700">使用</button>
                                        </div>
                                    }
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        // ============================================================
        // Lobby (Players list, hearts, PK)
        // ============================================================
        const LobbyView = ({ user, db, classId, setMsg }) => {
            const [users, setUsers] = useState([]);
            const [filterClass, setFilterClass] = useState("all");
            const [selectedUser, setSelectedUser] = useState(null);
            const [attackerPKState, setAttackerPKState] = useState(null);

            useEffect(() => {
                if (!db) return;
                const fetchAll = async () => {
                    let allUsers = [];
                    for (let c of CLASSES) {
                        const q = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', c, 'users');
                        const snap = await window.firebaseModules.getDocs(q);
                        snap.forEach(d => allUsers.push({ ...d.data(), class: c, id: d.id }));
                    }
                    setUsers(allUsers);
                };
                fetchAll();
            }, [db]);

            const filtered = filterClass === 'all' ? users : users.filter(u => u.class === filterClass);

            const sendingHeartRef = useRef(false); // 防連點
            const sendHeart = async (target) => {
                if (target.id === user.id) return setMsg({ title: "提示", content: "不能送愛心給自己喔！" });
                if ((user.heartsSentToday || {})[target.id]) return setMsg({ title: "今天已送過", content: "每天對同一位同學只能送一顆愛心喔！" });
                if (sendingHeartRef.current) return;
                sendingHeartRef.current = true;
                try {
                    const fm = window.firebaseModules;
                    await fm.updateDoc(fm.doc(db, 'artifacts', APP_ID, 'classes', target.class, 'users', target.id), {
                        hearts: fm.increment(1)
                    });
                    await fm.updateDoc(fm.doc(db, 'artifacts', APP_ID, 'classes', user.class || classId, 'users', user.id), {
                        heartsSentToday: { ...(user.heartsSentToday || {}), [target.id]: true }
                    });
                    setMsg({ title: "愛心發送", content: `你送了一顆愛心給 ${target.nickname || "神秘人"}！` });
                    setSelectedUser(null);
                } finally { sendingHeartRef.current = false; }
            };

            const startPK = async (target) => {
                if ((user.dailyPkAttacks || 0) >= 5) return setMsg({ title: "次數已滿", content: "今日發起 PK 已達 5 次上限！" });
                if (user.hp <= 0) return setMsg({ title: "無法戰鬥", content: "你的生命值歸零，無法發起 PK！" });
                if (hasActiveBuff(target, "pk_shield")) return setMsg({ title: "PK 護盾", content: "對方有護盾保護，無法攻擊！" });
                if ((target.dailyPkDefenses || 0) >= 5) return setMsg({ title: "對方休息中", content: "對方今日已被攻擊 5 次，保護中。" });

                const qRef = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                const qSnap = await window.firebaseModules.getDocs(qRef);
                if (qSnap.empty) return setMsg({ title: "錯誤", content: "目前沒有題庫，無法 PK" });
                const questions = qSnap.docs.map(d => d.data()).filter(q => q.options && q.answer);
                if (questions.length === 0) return setMsg({ title: "錯誤", content: "題庫沒有單選題" });
                const randomQ = questions[Math.floor(Math.random() * questions.length)];

                setSelectedUser(null);
                setAttackerPKState({ targetUser: target, question: randomQ });
            };

            return (
                <div>
                    <div className="flex gap-2 overflow-x-auto pb-2 mb-2">
                        <button onClick={() => setFilterClass('all')} className={`px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap transition ${filterClass === 'all' ? 'bg-blue-500 text-white shadow' : 'glass-panel text-slate-500'}`}>全部</button>
                        {CLASSES.map(c => (
                            <button key={c} onClick={() => setFilterClass(c)} className={`px-4 py-1 rounded-full text-xs font-bold whitespace-nowrap transition ${filterClass === c ? 'bg-blue-500 text-white shadow' : 'glass-panel text-slate-500'}`}>{c}班</button>
                        ))}
                    </div>

                    <div className="text-xs text-white/60 mb-2 text-center">今日 PK 次數：發起 {user.dailyPkAttacks || 0}/5 · 被攻擊 {user.dailyPkDefenses || 0}/5</div>

                    <div className="grid grid-cols-4 gap-3">
                        {filtered.map(u => (
                            <div key={u.id} onClick={() => setSelectedUser(u)} className="glass-panel p-2 flex flex-col items-center cursor-pointer hover:bg-white/80 transition transform hover:scale-105">
                                <img src={u.avatar} className="w-10 h-10 rounded-full bg-white border border-slate-200 object-cover" />
                                <div className="text-xs truncate font-bold mt-1 text-slate-700 w-full text-center">{u.nickname || "神秘人"}</div>
                            </div>
                        ))}
                    </div>

                    {selectedUser && (() => {
                        const eff = getEffectiveStats(selectedUser);
                        return (
                            <Modal title="玩家資訊" onClose={() => setSelectedUser(null)}>
                                <div className="text-center">
                                    <img src={selectedUser.avatar} className="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-white shadow object-cover bg-white" />
                                    <h3 className="text-xl font-bold mb-1">{selectedUser.nickname || "神秘人"}</h3>
                                    <div className="flex justify-center gap-4 text-sm mb-4">
                                        <span className="text-red-500 font-bold">HP {selectedUser.hp || 0}/{eff.maxHp}</span>
                                        <span className="text-orange-500 font-bold">ATK {eff.atk}</span>
                                        <span className="text-blue-500 font-bold">DEF {eff.def}</span>
                                    </div>
                                    <div className="flex justify-center gap-2">
                                        <button onClick={() => sendHeart(selectedUser)} className="bg-pink-500 text-white px-4 py-2 rounded-lg hover:bg-pink-600"><i className="fas fa-heart"></i> 送愛心</button>
                                        {selectedUser.id !== user.id && (
                                            <button onClick={() => startPK(selectedUser)} className="bg-red-600 text-white px-4 py-2 rounded-lg hover:bg-red-700"><i className="fas fa-khanda"></i> 來 PK</button>
                                        )}
                                    </div>
                                </div>
                            </Modal>
                        );
                    })()}

                    {attackerPKState && (
                        <PKAttackerModal
                            user={user}
                            target={attackerPKState.targetUser}
                            question={attackerPKState.question}
                            db={db}
                            classId={classId}
                            onClose={() => setAttackerPKState(null)}
                            setMsg={setMsg}
                        />
                    )}
                </div>
            );
        };

        // ============================================================
        // QuizModal (Multiple Choice)
        // ============================================================
        const QuizModal = ({ user, db, classId, onClose, onComplete, activeChapters }) => {
            const [questions, setQuestions] = useState([]);
            const [currentQ, setCurrentQ] = useState(0);
            const [results, setResults] = useState([]);
            const [finished, setFinished] = useState(false);
            const [errorMsg, setErrorMsg] = useState(null);
            const [selectedOption, setSelectedOption] = useState(null);
            const [bonusInfo, setBonusInfo] = useState(null); // 結算加碼資訊（進步/安慰/導師鼓勵）
            const submittingRef = useRef(false); // 防連點：避免同一題送出兩次

            useEffect(() => {
                const fetchQ = async () => {
                    if (!activeChapters || activeChapters.length === 0) {
                        setErrorMsg("目前不在開放答題的期間");
                        return;
                    }
                    const qRef = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'questions');
                    const snap = await window.firebaseModules.getDocs(qRef);
                    const all = snap.docs.map(d => d.data())
                        .filter(q => q.options && q.answer && activeChapters.includes(q.chapter));
                    if (all.length < 3) {
                        setErrorMsg(`目前章節（${activeChapters.join("、")}）題庫不足 3 題`);
                        return;
                    }
                    const shuffled = all.sort(() => 0.5 - Math.random()).slice(0, 3);
                    setQuestions(shuffled);
                };
                fetchQ();
            }, []);

            const submitAnswer = (letter) => {
                if (submittingRef.current) return;
                submittingRef.current = true;
                const q = questions[currentQ];
                const isCorrect = letter === q.answer;
                const reward = isCorrect ? {
                    gold: parseInt(q.gold) || 10,
                    hp: parseInt(q.hp) || 0,
                    atk: parseInt(q.atk) || 0,
                    def: parseInt(q.def) || 0
                } : null;

                const { addDoc, collection } = window.firebaseModules;
                addDoc(collection(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id, 'quiz_history'), {
                    question: q.question,
                    chapter: q.chapter,
                    isCorrect,
                    selectedOption: letter,
                    correctOption: q.answer,
                    timestamp: Date.now()
                });

                const newResults = [...results, { correct: isCorrect, reward, chapter: q.chapter }];
                setResults(newResults);
                setSelectedOption(null);

                if (currentQ < questions.length - 1) {
                    setCurrentQ(currentQ + 1);
                    submittingRef.current = false; // 進入下一題後解鎖
                } else {
                    finishQuiz(newResults); // 最後一題：保持鎖定，避免結算跑兩次
                }
            };

            const finishQuiz = async (finalResults) => {
                setFinished(true);
                let totalGold = 0, totalHp = 0, totalAtk = 0, totalDef = 0, correctCount = 0;
                finalResults.forEach(r => {
                    if (r.correct) {
                        correctCount++;
                        if (r.reward) {
                            totalGold += r.reward.gold;
                            totalHp += r.reward.hp;
                            totalAtk += r.reward.atk;
                            totalDef += r.reward.def;
                        }
                    }
                });
                const wrongCount = finalResults.length - correctCount;
                const comfortGold = wrongCount * 2; // 努力獎勵：答錯每題也給 2 金

                let xpGain = 30;
                if (hasActiveBuff(user, "wisdom_aura")) xpGain = Math.floor(xpGain * 1.5);
                if (hasActiveBuff(user, "gold_blessing")) totalGold = Math.floor(totalGold * 1.5);

                const { doc, runTransaction } = window.firebaseModules;
                const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id);

                let bonus = { perfect: false, progress: false, progressBonus: 0, comfortGold, comfortLine: null, mentorLine: null };
                await runTransaction(db, async (t) => {
                    const uDoc = await t.get(userRef);
                    const d = uDoc.data();

                    // ===== 進步之星：這次答對率贏過自己的生涯平均（升級石常勝軍因已 100% 不會重複領）=====
                    const prevQ = d.totalQuizQuestions || 0;
                    const prevC = d.totalQuizCorrect || 0;
                    const sessionAcc = correctCount / finalResults.length;
                    const isPerfect = correctCount === finalResults.length;
                    const isProgress = prevQ >= 3 && sessionAcc > (prevC / prevQ);
                    const progressBonus = isProgress ? 15 : 0;
                    bonus.perfect = isPerfect;
                    bonus.progress = isProgress;
                    bonus.progressBonus = progressBonus;

                    // ===== 最近 20 題滾動紀錄（進步之星排行榜用）=====
                    const recent = Array.isArray(d.recentResults) ? [...d.recentResults] : [];
                    finalResults.forEach(r => recent.push(r.correct ? 1 : 0));
                    while (recent.length > 20) recent.shift();

                    // ===== 煉金導師鼓勵：答對率 < 60% 且累積 ≥ 9 題的同學，每 3 天觸發一次 =====
                    const careerAccAfter = (prevC + correctCount) / (prevQ + finalResults.length);
                    const todayStr = formatDate(new Date());
                    let mentorTriggered = false;
                    if (prevQ + finalResults.length >= 9 && careerAccAfter < 0.6) {
                        const last = d.lastMentorDate ? new Date(d.lastMentorDate) : null;
                        const daysSince = last ? Math.floor((Date.now() - last.getTime()) / ONE_DAY_MS) : 999;
                        if (daysSince >= 3) mentorTriggered = true;
                    }
                    bonus.mentorLine = mentorTriggered ? MENTOR_LINES[Math.floor(Math.random() * MENTOR_LINES.length)] : null;
                    bonus.comfortLine = correctCount <= 1 ? COMFORT_LINES[Math.floor(Math.random() * COMFORT_LINES.length)] : null;

                    const newBaseMaxHp = (d.baseMaxHp ?? d.maxHp ?? 100) + totalHp;
                    const newBaseAtk = (d.baseAtk ?? d.atk ?? 10) + totalAtk;
                    const newBaseDef = (d.baseDef ?? d.def ?? 10) + totalDef;

                    // 章節統計
                    const chapStats = { ...(d.chapterStats || {}) };
                    finalResults.forEach(r => {
                        const c = r.chapter || "unknown";
                        if (!chapStats[c]) chapStats[c] = { questions: 0, correct: 0 };
                        chapStats[c].questions += 1;
                        if (r.correct) chapStats[c].correct += 1;
                    });

                    // 升級判斷
                    const newXp = (d.xp || 0) + xpGain;
                    const newLvl = getLevelInfo(newXp);
                    const lvlChanged = newLvl.name !== getLevelInfo(d.xp || 0).name;
                    const goldDelta = totalGold + comfortGold + bonus.progressBonus;
                    let upd = {
                        gold: (d.gold || 0) + goldDelta,
                        totalGoldEarned: (d.totalGoldEarned || 0) + goldDelta,
                        recentResults: recent,
                        ...(bonus.mentorLine ? { lastMentorDate: todayStr } : {}),
                        baseMaxHp: newBaseMaxHp,
                        baseAtk: newBaseAtk,
                        baseDef: newBaseDef,
                        hp: Math.min((d.hp || 0) + totalHp, newBaseMaxHp + (SHOP_ITEMS[d.equippedAccessory] && SHOP_ITEMS[d.equippedAccessory].effects ? SHOP_ITEMS[d.equippedAccessory].effects.hp || 0 : 0)),
                        dailyQuizCount: (d.dailyQuizCount || 0) + 1,
                        totalQuizQuestions: (d.totalQuizQuestions || 0) + finalResults.length,
                        totalQuizCorrect: (d.totalQuizCorrect || 0) + correctCount,
                        chapterStats: chapStats,
                        xp: newXp
                    };
                    if (lvlChanged) {
                        upd.levelName = newLvl.name;
                        upd.baseMaxHp = newBaseMaxHp + newLvl.hp;
                        upd.baseAtk = newBaseAtk + newLvl.atk;
                        upd.baseDef = newBaseDef + newLvl.def;
                        upd.hp = upd.baseMaxHp;
                    }
                    t.update(userRef, upd);
                });
                setBonusInfo({ ...bonus });
                onComplete && onComplete();
            };

            if (errorMsg) return (
                <Modal title="提示" onClose={onClose}>
                    <div className="text-center p-4">
                        <i className="fas fa-exclamation-circle text-4xl text-orange-500 mb-2"></i>
                        <p>{errorMsg}</p>
                        <button onClick={onClose} className="mt-4 bg-gray-500 text-white px-4 py-2 rounded">關閉</button>
                    </div>
                </Modal>
            );
            if (questions.length === 0) return <Loading msg="抽取題目中..." />;

            if (finished) {
                return (
                    <Modal title="答題完成！" onClose={onClose}>
                        <div className="text-center">
                            <h3 className="text-2xl font-bold mb-4 text-blue-600">答對 {results.filter(r => r.correct).length} / {results.length} 題</h3>
                            {bonusInfo && bonusInfo.perfect && (
                                <div className="bg-yellow-100 border-2 border-yellow-300 text-yellow-800 rounded-lg p-3 mb-3 font-bold animate-bounce-short">🌟 完美表現！全部答對，太神啦！</div>
                            )}
                            {bonusInfo && !bonusInfo.perfect && bonusInfo.progress && (
                                <div className="bg-emerald-100 border-2 border-emerald-300 text-emerald-800 rounded-lg p-3 mb-3 font-bold animate-bounce-short">📈 進步之星！這次表現贏過了過去的自己，額外 +{bonusInfo.progressBonus} 金幣！</div>
                            )}
                            {bonusInfo && bonusInfo.comfortLine && (
                                <div className="bg-blue-50 border border-blue-200 text-blue-700 rounded-lg p-3 mb-3 text-sm font-bold">{bonusInfo.comfortLine}</div>
                            )}
                            {bonusInfo && bonusInfo.comfortGold > 0 && (
                                <div className="text-xs text-slate-500 mb-3">努力獎勵：答錯的題目每題也有 +2 金幣（共 +{bonusInfo.comfortGold}）</div>
                            )}
                            {bonusInfo && bonusInfo.mentorLine && (
                                <div className="bg-purple-50 border border-purple-200 text-purple-700 rounded-lg p-3 mb-3 text-sm font-bold text-left">{bonusInfo.mentorLine}</div>
                            )}
                            <div className="bg-yellow-50 p-4 rounded mb-4 text-left">
                                <ul className="text-sm text-gray-600 space-y-1">
                                    {results.map((r, i) => (
                                        <li key={i} className={r.correct ? "text-green-600" : "text-red-400"}>
                                            第 {i + 1} 題：{r.correct ? "正確" : "錯誤"}
                                            {r.correct && r.reward && (
                                                <span className="ml-2 text-xs bg-white border px-1 rounded">
                                                    {r.reward.gold > 0 && `+${r.reward.gold}金 `}
                                                    {r.reward.hp > 0 && `+${r.reward.hp}HP `}
                                                    {r.reward.atk > 0 && `+${r.reward.atk}ATK `}
                                                    {r.reward.def > 0 && `+${r.reward.def}DEF`}
                                                </span>
                                            )}
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            <button onClick={onClose} className="bg-blue-600 text-white px-6 py-2 rounded font-bold shadow-lg hover:bg-blue-700">太棒了</button>
                        </div>
                    </Modal>
                );
            }

            const q = questions[currentQ];
            return (
                <Modal title={`每日答題 (${currentQ + 1}/${questions.length})`}>
                    <div className="space-y-4">
                        {q.chapter && <div className="text-xs bg-blue-100 text-blue-700 inline-block px-2 py-0.5 rounded font-bold">{q.chapter} {CHAPTER_NAMES[q.chapter] || ""}</div>}
                        <p className="font-bold text-lg bg-slate-50 p-3 rounded border border-slate-200">{q.question}</p>
                        {q.imageUrl && <img src={q.imageUrl} className="max-w-full max-h-60 mx-auto rounded border" onError={(e) => e.target.style.display = 'none'} />}
                        <div>
                            {["A", "B", "C", "D"].map(L => q.options?.[L] && (
                                <button
                                    key={L}
                                    onClick={() => setSelectedOption(L)}
                                    className={`option-btn ${selectedOption === L ? 'border-blue-600 bg-blue-100' : ''}`}>
                                    <span className="label">{L}</span>{q.options[L]}
                                </button>
                            ))}
                        </div>
                        <button disabled={!selectedOption} onClick={() => submitAnswer(selectedOption)} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 shadow-md disabled:opacity-40">送出答案</button>
                    </div>
                </Modal>
            );
        };

        // ============================================================
        // PK
        // ============================================================
        const PKAttackerModal = ({ user, target, question, db, classId, onClose, setMsg }) => {
            const [answer, setAnswer] = useState(null);
            const sendingRef = useRef(false); // 防連點：避免發起兩場 PK
            const submitAttack = async () => {
                if (!answer) return;
                if (sendingRef.current) return;
                sendingRef.current = true;
                try {
                    const isCorrect = answer === question.answer;
                    const { addDoc, collection, doc, updateDoc, increment } = window.firebaseModules;
                    await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'active_pks'), {
                        attackerId: user.id,
                        attackerClass: user.class || classId,
                        defenderId: target.id,
                        defenderClass: target.class,
                        question: question,
                        attackerCorrect: isCorrect,
                        attackerAnswer: answer,
                        attackerAtk: getEffectiveStats(user).atk,
                        attackerWarGodRage: hasActiveBuff(user, "war_god_rage"),
                        status: 'active',
                        timestamp: Date.now()
                    });
                    await updateDoc(doc(db, 'artifacts', APP_ID, 'classes', user.class || classId, 'users', user.id), {
                        dailyPkAttacks: increment(1)
                    });
                    onClose();
                    setMsg({ title: "PK 發起成功", content: "等待對方回應後將自動結算。" });
                } catch (e) {
                    sendingRef.current = false; // 失敗時解鎖，允許重試
                    setMsg({ title: "PK 發起失敗", content: e.message || "請稍後再試" });
                }
            };

            return (
                <Modal title="發起 PK 攻擊！">
                    <div className="space-y-4">
                        <div className="text-center text-sm text-gray-500 mb-2">對手：{target.nickname || "神秘人"}</div>
                        {question.chapter && <div className="text-xs bg-blue-100 text-blue-700 inline-block px-2 py-0.5 rounded font-bold">{question.chapter}</div>}
                        <p className="font-bold text-lg">{question.question}</p>
                        {question.imageUrl && <img src={question.imageUrl} className="max-w-full max-h-60 mx-auto rounded border" onError={(e) => e.target.style.display = 'none'} />}
                        <div>
                            {["A", "B", "C", "D"].map(L => question.options?.[L] && (
                                <button key={L} onClick={() => setAnswer(L)} className={`option-btn ${answer === L ? 'border-red-600 bg-red-100' : ''}`}>
                                    <span className="label">{L}</span>{question.options[L]}
                                </button>
                            ))}
                        </div>
                        <button disabled={!answer} onClick={submitAttack} className="w-full bg-red-600 text-white py-2 rounded font-bold disabled:opacity-40">發動攻擊</button>
                    </div>
                </Modal>
            );
        };

        const PKDefenderModal = ({ user, pkData, db, classId, onComplete }) => {
            const [answer, setAnswer] = useState(null);
            const [result, setResult] = useState(null);
            const resolvingRef = useRef(false); // 防連點：避免同一場 PK 結算兩次

            const resolvePK = async () => {
                if (!answer) return;
                if (resolvingRef.current) return;
                resolvingRef.current = true;
                const defenderCorrect = answer === pkData.question.answer;
                const attackerCorrect = pkData.attackerCorrect;
                const qRewards = pkData.question;
                let defenderLog = "";
                let attackerLog = "";

                const { doc, runTransaction, addDoc, collection, increment } = window.firebaseModules;
                const defenderRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id);
                const attClass = pkData.attackerClass || classId;
                const attackerRef = doc(db, 'artifacts', APP_ID, 'classes', attClass, 'users', pkData.attackerId);
                const pkRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'active_pks', pkData.id);

                try {
                    let useRevive = { attacker: false, defender: false };
                    let battleRecord = null; // 戰報（transaction 成功後寫入 pk_history）
                    await runTransaction(db, async (t) => {
                        // 先確認這場 PK 還存在（防止連點/多裝置造成重複結算）
                        const pkDoc = await t.get(pkRef);
                        if (!pkDoc.exists()) throw "這場 PK 已經結算過了";
                        const dDoc = await t.get(defenderRef);
                        const aDoc = await t.get(attackerRef);
                        if (!aDoc.exists()) {
                            t.delete(pkRef);
                            throw "對手已消失";
                        }
                        const dData = dDoc.data();
                        const aData = aDoc.data();

                        // PK 護盾防護
                        if (hasActiveBuff(dData, "pk_shield")) {
                            t.delete(pkRef);
                            throw "你有 PK 護盾，攻擊已被擋下";
                        }

                        const dmgToDefender = calcPkDamage(aData, dData);
                        const dmgToAttacker = calcPkDamage(dData, aData);

                        let dUpd = { dailyPkDefenses: (dData.dailyPkDefenses || 0) + 1 };
                        let aUpd = {};
                        const goldGain = parseInt(qRewards.gold) || 10;
                        const hpGain = parseInt(qRewards.hp) || 0;
                        const atkGain = parseInt(qRewards.atk) || 0;
                        const defGain = parseInt(qRewards.def) || 0;

                        if (attackerCorrect && defenderCorrect) {
                            // 平手：雙方獲得獎勵
                            const dEff = getEffectiveStats(dData);
                            const aEff = getEffectiveStats(aData);
                            dUpd.gold = (dData.gold || 0) + goldGain;
                            dUpd.totalGoldEarned = (dData.totalGoldEarned || 0) + goldGain;
                            dUpd.baseMaxHp = (dData.baseMaxHp ?? dData.maxHp ?? 100) + hpGain;
                            dUpd.baseAtk = (dData.baseAtk ?? dData.atk ?? 10) + atkGain;
                            dUpd.baseDef = (dData.baseDef ?? dData.def ?? 10) + defGain;
                            dUpd.pkDraws = (dData.pkDraws || 0) + 1;
                            aUpd.gold = (aData.gold || 0) + goldGain;
                            aUpd.totalGoldEarned = (aData.totalGoldEarned || 0) + goldGain;
                            aUpd.baseMaxHp = (aData.baseMaxHp ?? aData.maxHp ?? 100) + hpGain;
                            aUpd.baseAtk = (aData.baseAtk ?? aData.atk ?? 10) + atkGain;
                            aUpd.baseDef = (aData.baseDef ?? aData.def ?? 10) + defGain;
                            aUpd.pkDraws = (aData.pkDraws || 0) + 1;
                            defenderLog = `平手！雙方都答對，獲得 ${goldGain} 金幣${hpGain ? "+" + hpGain + "HP " : ""}${atkGain ? "+" + atkGain + "ATK " : ""}${defGain ? "+" + defGain + "DEF" : ""}。`;
                            attackerLog = `平手！你與 ${dData.nickname || "神秘人"} 都答對。`;
                        } else if (attackerCorrect && !defenderCorrect) {
                            // 攻擊者勝：扣防守方 HP，攻擊方雙倍獎勵
                            aUpd.gold = (aData.gold || 0) + goldGain * 2;
                            aUpd.totalGoldEarned = (aData.totalGoldEarned || 0) + goldGain * 2;
                            aUpd.baseMaxHp = (aData.baseMaxHp ?? aData.maxHp ?? 100) + hpGain * 2;
                            aUpd.baseAtk = (aData.baseAtk ?? aData.atk ?? 10) + atkGain * 2;
                            aUpd.baseDef = (aData.baseDef ?? aData.def ?? 10) + defGain * 2;
                            aUpd.pkWins = (aData.pkWins || 0) + 1;
                            let newDefHp = Math.max(0, (dData.hp || 0) - dmgToDefender);
                            // 復活符
                            if (newDefHp === 0) {
                                const revIdx = (dData.inventory || []).findIndex(i => i && i.itemId === "revive-charm");
                                if (revIdx >= 0) {
                                    dUpd.inventory = invRemove(dData.inventory, "revive-charm", 1);
                                    const dEff = getEffectiveStats(dData);
                                    newDefHp = dEff.maxHp;
                                    dUpd.usedRevives = (dData.usedRevives || 0) + 1;
                                    useRevive.defender = true;
                                }
                            }
                            dUpd.hp = newDefHp;
                            dUpd.pkLosses = (dData.pkLosses || 0) + 1;
                            defenderLog = `戰敗... 扣 ${dmgToDefender} HP${useRevive.defender ? "（復活符已自動觸發！）" : ""}`;
                            attackerLog = `勝利！${dData.nickname || "神秘人"} 答錯，獲得雙倍獎勵 ${goldGain * 2} 金幣！`;
                        } else if (!attackerCorrect && defenderCorrect) {
                            dUpd.gold = (dData.gold || 0) + goldGain * 2;
                            dUpd.totalGoldEarned = (dData.totalGoldEarned || 0) + goldGain * 2;
                            dUpd.baseMaxHp = (dData.baseMaxHp ?? dData.maxHp ?? 100) + hpGain * 2;
                            dUpd.baseAtk = (dData.baseAtk ?? dData.atk ?? 10) + atkGain * 2;
                            dUpd.baseDef = (dData.baseDef ?? dData.def ?? 10) + defGain * 2;
                            dUpd.pkWins = (dData.pkWins || 0) + 1;
                            let newAttHp = Math.max(0, (aData.hp || 0) - dmgToAttacker);
                            if (newAttHp === 0) {
                                const revIdx = (aData.inventory || []).findIndex(i => i && i.itemId === "revive-charm");
                                if (revIdx >= 0) {
                                    aUpd.inventory = invRemove(aData.inventory, "revive-charm", 1);
                                    const aEff = getEffectiveStats(aData);
                                    newAttHp = aEff.maxHp;
                                    aUpd.usedRevives = (aData.usedRevives || 0) + 1;
                                    useRevive.attacker = true;
                                }
                            }
                            aUpd.hp = newAttHp;
                            aUpd.pkLosses = (aData.pkLosses || 0) + 1;
                            defenderLog = `勝利！你答對，獲得雙倍獎勵 ${goldGain * 2} 金幣！`;
                            attackerLog = `戰敗... ${dData.nickname || "神秘人"} 答對，你扣 ${dmgToAttacker} HP${useRevive.attacker ? "（復活符已觸發！）" : ""}`;
                        } else {
                            // 雙方都錯：雙方都扣 HP
                            let newDefHp = Math.max(0, (dData.hp || 0) - 30);
                            let newAttHp = Math.max(0, (aData.hp || 0) - 30);
                            dUpd.hp = newDefHp;
                            aUpd.hp = newAttHp;
                            defenderLog = `慘烈... 雙方都答錯，各扣 30 HP。`;
                            attackerLog = `慘烈... 你與 ${dData.nickname || "神秘人"} 都答錯。`;
                        }

                        const winner = attackerCorrect && defenderCorrect ? "draw"
                            : attackerCorrect && !defenderCorrect ? "attacker"
                            : !attackerCorrect && defenderCorrect ? "defender" : "both_wrong";
                        battleRecord = {
                            attackerId: pkData.attackerId, attackerClass: attClass,
                            attackerName: aData.name || "", attackerSeat: aData.seat || "",
                            defenderId: user.id, defenderClass: classId,
                            defenderName: dData.name || "", defenderSeat: dData.seat || "",
                            chapter: (pkData.question && pkData.question.chapter) || "",
                            question: (pkData.question && pkData.question.question) || "",
                            attackerCorrect: !!attackerCorrect, defenderCorrect: !!defenderCorrect,
                            winner,
                            damage: winner === "attacker" ? dmgToDefender : winner === "defender" ? dmgToAttacker : winner === "both_wrong" ? 30 : 0,
                            reviveUsed: useRevive.attacker || useRevive.defender,
                            timestamp: Date.now()
                        };

                        t.update(defenderRef, dUpd);
                        t.update(attackerRef, aUpd);
                        t.delete(pkRef);
                    });

                    // 寫入 PK 戰報（非關鍵路徑，失敗不影響結算）
                    if (battleRecord) {
                        addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'pk_history'), battleRecord).catch(() => { });
                    }

                    await addDoc(collection(db, 'artifacts', APP_ID, 'public', 'data', 'notifications'), {
                        targetId: pkData.attackerId,
                        message: attackerLog,
                        timestamp: Date.now()
                    });

                    setResult(defenderLog);
                } catch (e) {
                    console.error(e);
                    resolvingRef.current = false; // 失敗時解鎖，允許重試
                    setResult(typeof e === "string" ? e : "PK 處理失敗");
                }
            };

            return (
                <div className="modal-overlay">
                    <div className="bg-white rounded-xl shadow-2xl max-w-md w-full p-6 animate-bounce-short border-4 border-red-500">
                        <h3 className="text-2xl font-bold text-center text-red-600 mb-2">⚔️ 遭受 PK 攻擊！</h3>
                        {!result ? (
                            <div className="space-y-4">
                                <p className="text-center text-gray-500">來自 {pkData.attackerClass || ""}班的挑戰</p>
                                {pkData.question.chapter && <div className="text-xs bg-blue-100 text-blue-700 inline-block px-2 py-0.5 rounded font-bold">{pkData.question.chapter}</div>}
                                <div className="bg-gray-100 p-4 rounded font-bold">{pkData.question.question}</div>
                                {pkData.question.imageUrl && <img src={pkData.question.imageUrl} className="max-w-full max-h-60 mx-auto rounded border" onError={(e) => e.target.style.display = 'none'} />}
                                <div>
                                    {["A", "B", "C", "D"].map(L => pkData.question?.options?.[L] && (
                                        <button key={L} onClick={() => setAnswer(L)} className={`option-btn ${answer === L ? 'border-red-600 bg-red-100' : ''}`}>
                                            <span className="label">{L}</span>{pkData.question.options[L]}
                                        </button>
                                    ))}
                                </div>
                                <button disabled={!answer} onClick={resolvePK} className="w-full bg-red-600 text-white py-3 rounded font-bold text-lg disabled:opacity-40">反擊</button>
                            </div>
                        ) : (
                            <div className="text-center space-y-4">
                                <div className="text-xl font-bold">{result}</div>
                                <button onClick={onComplete} className="w-full bg-gray-600 text-white py-2 rounded">關閉</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ============================================================
        // Profile Settings
        // ============================================================
        const ProfileSettings = ({ user, db, classId, setMsg }) => {
            const [pwd, setPwd] = useState("");
            const [nickname, setNickname] = useState(user.nickname || "");
            const [avatar, setAvatar] = useState(user.avatar || AVATARS[0]);
            const [customAvatar, setCustomAvatar] = useState("");
            const [gender, setGender] = useState(user.gender || "boy");
            const finalAvatar = customAvatar || avatar;

            const handleUpdate = async () => {
                let updates = {};
                if (pwd) updates.password = pwd;
                if (nickname) updates.nickname = nickname;
                if (finalAvatar) updates.avatar = finalAvatar;
                if (gender) updates.gender = gender;
                await window.firebaseModules.updateDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id), updates);
                setPwd("");
                setMsg({ title: "成功", content: "個人資料修改完成！" });
            };

            return (
                <div className="glass-panel p-6">
                    <h3 className="font-bold text-lg mb-4 text-slate-800 border-b pb-2">修改個人檔案</h3>
                    <div className="space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">暱稱</label>
                            <input value={nickname} onChange={e => setNickname(e.target.value)} className="w-full p-2 border rounded" />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-1">性別</label>
                            <div className="flex gap-4">
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="p_gender" value="boy" checked={gender === 'boy'} onChange={() => setGender('boy')} /> 男生</label>
                                <label className="flex items-center gap-1 cursor-pointer"><input type="radio" name="p_gender" value="girl" checked={gender === 'girl'} onChange={() => setGender('girl')} /> 女生</label>
                            </div>
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-slate-500 mb-2">更換頭像</label>
                            <div className="flex gap-2 mb-2 flex-wrap bg-white/50 p-2 rounded justify-center">
                                {AVATARS.map(a => (
                                    <img key={a} src={a} onClick={() => setAvatar(a)} className={`w-12 h-12 rounded-full avatar-option ${avatar === a && !customAvatar ? 'selected' : ''}`} />
                                ))}
                            </div>
                            <input value={customAvatar} onChange={e => setCustomAvatar(e.target.value)} className="w-full p-2 border rounded text-xs" placeholder="或貼上圖片網址..." />
                        </div>
                        <div className="pt-4 border-t">
                            <label className="block text-xs font-bold text-slate-500 mb-1">修改密碼 (留空則不修改)</label>
                            <input type="password" value={pwd} onChange={e => setPwd(e.target.value)} className="w-full p-2 border rounded" placeholder="輸入新密碼" />
                        </div>
                        <button onClick={handleUpdate} className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow hover:bg-blue-700 mt-2">儲存修改</button>
                    </div>
                </div>
            );
        };

        // ============================================================
        // Student Dashboard
        // ============================================================
        const StudentDashboard = ({ user, db, classId, onLogout }) => {
            const [view, setView] = useState('home');
            const [msg, setMsg] = useState(null);
            const [quizModal, setQuizModal] = useState(false);
            const [pkModal, setPkModal] = useState(null);
            const [pkNotification, setPkNotification] = useState(null);
            const [fortuneResult, setFortuneResult] = useState(null);
            const [currentUser, setCurrentUser] = useState({ ...user, class: classId });
            const [pdfTarget, setPdfTarget] = useState(null);
            const [downloading, setDownloading] = useState(false);
            const pdfRef = useRef(null);

            // 觸發 PDF 渲染：當 pdfTarget 改變且 DOM 已準備好，呼叫 renderToPdf
            useEffect(() => {
                if (!pdfTarget) return;
                let cancelled = false;
                (async () => {
                    await new Promise(r => setTimeout(r, 300)); // 等圖片載入
                    if (cancelled || !pdfRef.current) return;
                    try {
                        await renderToPdf(pdfRef.current, pdfTarget.filename);
                    } catch (e) {
                        console.error(e);
                        alert("PDF 產生失敗：" + (e.message || e));
                    }
                    setPdfTarget(null);
                    setDownloading(false);
                })();
                return () => { cancelled = true; };
            }, [pdfTarget]);

            const downloadMyReport = async () => {
                if (downloading) return;
                setDownloading(true);
                try {
                    let all = [];
                    for (let c of CLASSES) {
                        const q = window.firebaseModules.collection(db, 'artifacts', APP_ID, 'classes', c, 'users');
                        const snap = await window.firebaseModules.getDocs(q);
                        snap.forEach(d => all.push({ ...d.data(), class: c, id: d.id }));
                    }
                    all.sort((a, b) => (b.xp || 0) - (a.xp || 0));
                    const rank = all.findIndex(u => u.id === currentUser.id) + 1;
                    setPdfTarget({
                        filename: `${currentUser.class}班_${currentUser.seat}號_${currentUser.name}_學習報告.pdf`,
                        node: <StudentReportCard student={currentUser} classRank={rank} totalStudents={all.length} />
                    });
                } catch (e) {
                    setDownloading(false);
                    alert("無法產生報告：" + e.message);
                }
            };

            const activeInfo = getActiveChapters();
            const inMaintenance = activeInfo.maintenance;

            useEffect(() => {
                if (!db || !user.id) return;
                const unsubUser = window.firebaseModules.onSnapshot(
                    window.firebaseModules.doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', user.id),
                    (doc) => { if (doc.exists()) setCurrentUser({ id: doc.id, ...doc.data(), class: classId }); }
                );
                const pkQuery = window.firebaseModules.query(
                    window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'active_pks'),
                    window.firebaseModules.where('defenderId', '==', user.id),
                    window.firebaseModules.where('status', '==', 'active')
                );
                const unsubPk = window.firebaseModules.onSnapshot(pkQuery, (snap) => {
                    if (!snap.empty) {
                        const d = snap.docs[0];
                        const data = d.data();
                        // 自動清掉舊版 / 壞掉的 PK 資料（沒有 question 或 options 的）
                        if (!data.question || !data.question.options || typeof data.question.options !== 'object') {
                            window.firebaseModules.deleteDoc(window.firebaseModules.doc(db, 'artifacts', APP_ID, 'public', 'data', 'active_pks', d.id)).catch(() => { });
                            setPkModal(null);
                            return;
                        }
                        setPkModal({ id: d.id, ...data });
                    } else setPkModal(null);
                });
                const notifQuery = window.firebaseModules.query(
                    window.firebaseModules.collection(db, 'artifacts', APP_ID, 'public', 'data', 'notifications'),
                    window.firebaseModules.where('targetId', '==', user.id)
                );
                const unsubNotif = window.firebaseModules.onSnapshot(notifQuery, (snap) => {
                    if (!snap.empty) {
                        const n = snap.docs[0].data();
                        setPkNotification({ id: snap.docs[0].id, ...n });
                    }
                });
                return () => { unsubUser(); unsubPk(); unsubNotif(); };
            }, [db, user.id, classId]);

            // 舊資料遷移（從 atk/def/maxHp 搬到 baseAtk/baseDef/baseMaxHp，並清掉不相容的舊背包）
            useEffect(() => {
                if (!currentUser || !currentUser.id) return;
                const needsMigration = currentUser.atk !== undefined && currentUser.baseAtk === undefined;
                const inventoryDirty = Array.isArray(currentUser.inventory) && currentUser.inventory.length > 0 && currentUser.inventory.some(i => i && !i.itemId);
                if (!needsMigration && !inventoryDirty) return;
                (async () => {
                    const { doc, updateDoc } = window.firebaseModules;
                    const userRef = doc(db, 'artifacts', APP_ID, 'classes', classId, 'users', currentUser.id);
                    const upd = {};
                    if (needsMigration) {
                        upd.baseAtk = currentUser.atk || 10;
                        upd.baseDef = currentUser.def || 10;
                        upd.baseMaxHp = currentUser.maxHp || 100;
                        if (currentUser.dailyPkAttacks === undefined) upd.dailyPkAttacks = 0;
                        if (currentUser.dailyPkDefenses === undefined) upd.dailyPkDefenses = 0;
                        if (!Array.isArray(currentUser.buffs)) upd.buffs = [];
                    }
                    if (inventoryDirty) {
                        // 舊背包格式（{...item, uid}）不相容，清空
                        upd.inventory = (currentUser.inventory || []).filter(i => i && i.itemId);
